name: Build iOS (Manual)

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.0.app

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: |
        cd src/platforms/ios
        xcodegen generate

    - name: Build Unsigned .app
      run: |
        # 这里的关键是：ipa 本质上是 Payload/AppName.app 的 zip 压缩包
        
        # 使用生成的 .xcodeproj 进行构建
        xcodebuild -project src/platforms/ios/WangWangPhone.xcodeproj \
                   -scheme WangWangPhone \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath build_output \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   ENTITLEMENTS_REQUIRED=NO \
                   AD_HOC_CODE_SIGNING_ALLOWED=YES

        # 创建 IPA 目录结构
        mkdir -p build/Payload
        
        # 将构建出的 .app 放入 Payload 文件夹
        # xcodebuild 的默认输出路径在 derivedDataPath 下
        APP_PATH=$(find build_output/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
        cp -r "$APP_PATH" build/Payload/
        
        # 打包成 .ipa
        cd build && zip -r WangWangPhone.ipa Payload
        
    - name: Upload .ipa
      uses: actions/upload-artifact@v4
      with:
        name: wangwangji-ios-unsigned
        path: build/WangWangPhone.ipa