name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare public key file
        run: |
          set -euo pipefail
          mkdir -p tools/keys

          if [ -f "tools/keys/public.pem" ]; then
            echo "Found committed tools/keys/public.pem."
            exit 0
          fi

          if [ -n "${{ secrets.LICENSE_PUBLIC_PEM || '' }}" ]; then
            printf "%s\n" "${{ secrets.LICENSE_PUBLIC_PEM }}" > tools/keys/public.pem
            echo "Prepared tools/keys/public.pem from GitHub secret."
            exit 0
          fi

          KEY_B64=$(sed -n 's/.*rsaPublicKeyBase64 = "\(.*\)".*/\1/p' src/platforms/ios/WangWangPhone/Core/GeneratedPublicKey.swift | head -n 1)
          if [ -z "${KEY_B64}" ]; then
            echo "::error::Cannot prepare tools/keys/public.pem. Set secret LICENSE_PUBLIC_PEM or commit GeneratedPublicKey.swift with rsaPublicKeyBase64."
            exit 1
          fi

          {
            echo "-----BEGIN PUBLIC KEY-----"
            printf "%s" "${KEY_B64}" | fold -w 64
            echo
            echo "-----END PUBLIC KEY-----"
          } > tools/keys/public.pem
          echo "Prepared tools/keys/public.pem from GeneratedPublicKey.swift."

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: |
          cd src/platforms/ios
          xcodegen generate

      - name: Build unsigned .app
        run: |
          set -euo pipefail
          mkdir -p build_output
          LOG_PATH="build_output/xcodebuild.log"
          RESULT_BUNDLE_PATH="build_output/BuildResults.xcresult"

          set +e
          xcodebuild \
            -project src/platforms/ios/WangWangPhone.xcodeproj \
            -scheme WangWangPhone \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build_output \
            -resultBundlePath "${RESULT_BUNDLE_PATH}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ENTITLEMENTS_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            build 2>&1 | tee "${LOG_PATH}"
          XCODEBUILD_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "${XCODEBUILD_EXIT_CODE}" -ne 0 ]; then
            echo "::group::xcodebuild 错误摘要"
            grep -nE "error:|\\*\\* BUILD FAILED \\*\\*" "${LOG_PATH}" | head -n 200 || echo "未捕获到标准 error 行，请查看完整日志。"
            echo "::endgroup::"

            echo "::group::xcodebuild 日志最后 200 行"
            tail -n 200 "${LOG_PATH}" || true
            echo "::endgroup::"

            echo "::error::xcodebuild 构建失败。请下载 ios-build-logs artifact 查看完整日志和 xcresult。"
            exit "${XCODEBUILD_EXIT_CODE}"
          fi

      - name: Upload iOS build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            build_output/xcodebuild.log
            build_output/BuildResults.xcresult
          if-no-files-found: warn

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find build_output/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "${APP_PATH}" ]; then
            echo "::error::No .app found at build_output/Build/Products/Release-iphoneos"
            exit 1
          fi

          mkdir -p build/Payload
          cp -R "${APP_PATH}" build/Payload/
          cd build
          zip -qry WangWangPhone-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: wangwangji-ios-unsigned
          path: build/WangWangPhone-unsigned.ipa
          if-no-files-found: error
