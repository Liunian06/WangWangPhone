plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// Load version properties from root directory
def versionProps = new Properties()
def versionFile = rootProject.file("../../../../version.properties")
if (versionFile.exists()) {
    versionFile.withInputStream { versionProps.load(it) }
} else {
    // Try absolute path or project relative if file() failed
    versionFile = file("../../../../version.properties")
    if (versionFile.exists()) {
        versionFile.withInputStream { versionProps.load(it) }
    }
}

android {
    namespace 'com.WangWangPhone'
    compileSdk 35

    defaultConfig {
        applicationId "com.WangWangPhone"
        minSdk 31
        targetSdk 35
        versionCode versionProps['VERSION_CODE']?.toInteger() ?: 1
        versionName versionProps['VERSION_NAME'] ?: "1.0.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Ensure V2 signing is used as it's required for newer Android versions
            signingConfig signingConfigs.debug // For now use debug, but user should use their own
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    buildFeatures {
        compose true
    }
    composeOptions {
        kotlinCompilerExtensionVersion '1.5.1'
    }
    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
        // Support 16KB page sizes for Android 15+
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
    implementation 'androidx.activity:activity-compose:1.8.1'
    implementation platform('androidx.compose:compose-bom:2023.08.00')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material'
    implementation 'androidx.compose.foundation:foundation'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:core:3.5.1'
    androidTestImplementation platform('androidx.compose:compose-bom:2023.08.00')
    androidTestImplementation 'androidx.compose.ui:ui-test-junit4'
    debugImplementation 'androidx.compose.ui:ui-tooling'
    debugImplementation 'androidx.compose.ui:ui-test-manifest'
}