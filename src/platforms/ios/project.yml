name: WangWangPhone
options:
  bundleIdPrefix: com.WangWangPhone
targets:
  WangWangPhone:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WangWangPhone
    preBuildScripts:
      - name: "Generate Public Key"
        script: |
          bash "${PROJECT_DIR}/generate_pubkey.sh"
    settings:
      INFOPLIST_FILE: WangWangPhone/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.WangWangPhone.app
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
      DEVELOPMENT_TEAM: ""
