<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汪汪机 - iOS 桌面原型</title>
    <link rel="stylesheet" href="css/chat.css">
    <style>
        :root {
            --ios-radius: 20px;
            --dock-bg: rgba(255, 255, 255, 0.3);
            --text-color: white;
            --bg-color: #F2F2F7;
            --card-bg: white;
            --system-text: black;
            --header-bg: white;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1C1C1E;
                --card-bg: #2C2C2E;
                --system-text: white;
                --header-bg: #2C2C2E;
            }
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
            user-select: none;
            -webkit-user-select: none;
        }

        #phone-container {
            position: relative;
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            border-radius: 40px;
            box-shadow: 0 0 0 10px #333, 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 状态栏 */
        .status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
        }

        .status-right {
            display: flex;
            gap: 5px;
        }

        /* 锁屏界面 */
        #lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 100px;
            z-index: 50;
            transition: transform 0.5s ease-in-out;
            background: inherit;
        }

        #lock-screen.unlocked {
            transform: translateY(-100%);
        }

        .lock-time {
            font-size: 80px;
            font-weight: 200;
            color: var(--text-color);
        }

        .lock-date {
            font-size: 20px;
            margin-top: -10px;
            color: var(--text-color);
        }

        .unlock-hint {
            position: absolute;
            bottom: 50px;
            color: var(--text-color);
            font-size: 16px;
            animation: breathe 2s infinite;
            cursor: pointer;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 桌面界面 */
        #home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            box-sizing: border-box;
        }

        /* 小组件区域 */
        .widgets-area {
            display: flex;
            gap: 15px;
            padding: 0 20px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .widget {
            flex: 1;
            height: 150px;
            border-radius: 20px;
            padding: 15px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .clock-widget {
            background: linear-gradient(135deg, #E0C3FC 0%, #8EC5FC 100%);
        }

        .weather-widget {
            background: linear-gradient(135deg, #4FACFE 0%, #00F2FE 100%);
        }

        .widget-date { font-size: 12px; font-weight: 500; }
        .widget-time { font-size: 40px; font-weight: bold; }
        .widget-city { font-size: 10px; opacity: 0.8; }
        .widget-temp { font-size: 40px; font-weight: 300; }
        .widget-icon { font-size: 24px; }
        .widget-status { font-size: 12px; }
        .widget-range { font-size: 10px; opacity: 0.8; }

        /* 编辑模式提示栏 */
        .edit-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            margin: 0 20px 8px 20px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }

        .edit-banner.active {
            display: flex;
        }

        .edit-banner .done-btn {
            color: #007AFF;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* 应用网格 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px;
            padding: 10px 20px;
            position: relative;
        }

        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s ease;
            touch-action: none;
        }

        .app-icon-wrapper.dragging {
            opacity: 0.7;
            transform: scale(1.15);
            z-index: 100;
            position: relative;
        }

        .app-icon-wrapper.drop-target {
            transform: scale(0.85);
        }

        /* iOS 编辑模式抖动动画 */
        @keyframes wiggle1 {
            0%, 100% { transform: rotate(-1.5deg); }
            50% { transform: rotate(1.5deg); }
        }
        @keyframes wiggle2 {
            0%, 100% { transform: rotate(1.5deg); }
            50% { transform: rotate(-1.5deg); }
        }

        .app-icon-wrapper.edit-mode:nth-child(odd) {
            animation: wiggle1 0.3s ease-in-out infinite;
        }
        .app-icon-wrapper.edit-mode:nth-child(even) {
            animation: wiggle2 0.28s ease-in-out infinite;
        }
        .app-icon-wrapper.edit-mode.dragging {
            animation: none !important;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 65px;
        }

        .dock .app-icon {
            font-size: 55px;
        }

        .app-name {
            color: white;
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Dock 栏 */
        .dock {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            height: 90px;
            background: var(--dock-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            width: 120px;
            height: 5px;
            background: white;
            border-radius: 5px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
        }

        /* 设置界面覆盖层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .overlay-header {
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            color: var(--system-text);
        }

        .back-btn {
            position: absolute;
            left: 15px;
            color: #007AFF;
            cursor: pointer;
            font-size: 16px;
        }

        .overlay-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .settings-section { margin-bottom: 20px; }
        .section-title { font-size: 13px; color: #666; margin-left: 10px; margin-bottom: 5px; }

        .settings-list {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            color: var(--system-text);
        }

        .settings-item {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .settings-icon-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .settings-icon-img-dock {
            width: 35px;
            height: 35px;
            object-fit: contain;
        }

        .settings-item:last-child { border-bottom: none; }
        .status-val { color: #8E8E93; }

        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 14px; color: #666; margin-bottom: 5px; }

        .input-box {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px;
            word-break: break-all;
            min-height: 20px;
            color: var(--system-text);
        }

        textarea.input-box {
            width: 100%;
            border: none;
            height: 100px;
            box-sizing: border-box;
            font-family: inherit;
            resize: none;
            background: var(--card-bg);
            color: var(--system-text);
        }

        .btn-primary {
            background: #007AFF;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="phone-container">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="time">09:41</div>
        <div class="status-right">
            <span>📶</span>
            <span>5G</span>
            <span>🔋</span>
        </div>
    </div>

    <!-- 锁屏界面 -->
    <div id="lock-screen" onclick="unlock()">
        <div class="lock-time">09:41</div>
        <div class="lock-date">2月3日 星期二</div>
        <div class="unlock-hint">点击屏幕解锁</div>
    </div>

    <!-- 桌面界面 -->
    <div id="home-screen">
        <!-- 小组件区域 -->
        <div class="widgets-area">
            <div class="widget clock-widget">
                <div class="widget-date" id="widget-date">10月1日 星期一</div>
                <div class="widget-time" id="widget-time">09:41</div>
                <div class="widget-city">北京</div>
            </div>
            <div class="widget weather-widget">
                <div>
                    <div style="font-weight: bold;">北京</div>
                    <div class="widget-temp">24°</div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <div class="widget-icon">☀️</div>
                        <div class="widget-status">晴朗</div>
                    </div>
                    <div class="widget-range">最高 28° 最低 18°</div>
                </div>
            </div>
        </div>

        <!-- 编辑模式提示栏 -->
        <div class="edit-banner" id="edit-banner">
            <span>长按拖拽图标以调整位置</span>
            <span class="done-btn" id="edit-done-btn">完成</span>
        </div>

        <!-- 应用网格（动态渲染） -->
        <div class="app-grid" id="app-grid"></div>

        <!-- Dock 栏（动态渲染） -->
        <div class="dock" id="dock-bar"></div>

        <div class="home-indicator"></div>
    </div>

    <!-- 设置 Overlay -->
    <div id="settings-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideSettings()">返回</div>
            <div style="font-weight: 600;">设置</div>
        </div>
        <div class="overlay-content">
            <div class="settings-section">
                <div class="section-title">激活与授权</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="showActivation()">
                        <div style="display: flex; flex-direction: column;">
                            <span>软件激活</span>
                            <span id="expiry-date-web" style="font-size: 11px; color: #8E8E93; display: none;">有效期至: 2030-01-01</span>
                        </div>
                        <span class="status-val">未激活 ></span>
                    </div>
                </div>
            </div>
            <div class="settings-section">
                <div class="section-title">外观</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="showDisplaySettings()">
                        <span>显示设置</span>
                        <span class="status-val">></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 激活 Overlay -->
    <div id="activation-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideActivation()">取消</div>
            <div style="font-weight: 600;">激活授权</div>
        </div>
        <div class="overlay-content">
            <div class="input-group">
                <div class="input-label">机器码</div>
                <div id="web-machine-id" class="input-box" style="margin-bottom: 10px;">WEB-ID-FETCHING...</div>
                <button class="btn-primary" style="background: #34C759; margin-bottom: 20px; padding: 10px; font-size: 14px;" onclick="copyMachineId()">复制机器码</button>
            </div>
            <div class="input-group">
                <div class="input-label">激活码</div>
                <textarea id="license-key-input" class="input-box" style="margin-bottom: 10px;" placeholder="请输入激活码..."></textarea>
                <button class="btn-primary" style="background: #5856D6; margin-bottom: 20px; padding: 10px; font-size: 14px;" onclick="pasteLicenseKey()">粘贴激活码</button>
            </div>
            <button class="btn-primary" onclick="submitActivation()">激活</button>
        </div>
    </div>

    <!-- 显示设置 Overlay -->
    <div id="display-settings-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideDisplaySettings()">返回</div>
            <div style="font-weight: 600;">显示设置</div>
        </div>
        <div class="overlay-content">
            <div class="settings-section">
                <div class="section-title">锁屏壁纸</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="selectWallpaper('lock')">
                        <div style="display: flex; flex-direction: column;">
                            <span>锁屏壁纸设置</span>
                            <span id="lock-wp-status" style="font-size: 11px; color: #8E8E93;">点击更换</span>
                        </div>
                        <div id="lock-wp-preview" style="width: 50px; height: 50px; background: #eee; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center;">🖼️</div>
                    </div>
                </div>
            </div>
            <div class="settings-section">
                <div class="section-title">桌面壁纸</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="selectWallpaper('home')">
                        <div style="display: flex; flex-direction: column;">
                            <span>桌面壁纸设置</span>
                            <span id="home-wp-status" style="font-size: 11px; color: #8E8E93;">点击更换</span>
                        </div>
                        <div id="home-wp-preview" style="width: 50px; height: 50px; background: #eee; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center;">🖼️</div>
                    </div>
                </div>
            </div>
            <input type="file" id="wallpaper-input" style="display: none;" accept="image/*" onchange="handleWallpaperUpload(this)">
        </div>
    </div>
    <!-- 聊天App容器 -->
    <div id="chat-app-container" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:250;display:none;"></div>
</div>

<script type="module">
    import { getLocation } from './js/location.js';
    import { getWeather } from './js/weather.js';
    import { licenseManager } from './js/license.js';
    import { layoutManager } from './js/layout.js';
    import { ChatApp } from './js/chat.js';

    // 聊天App实例管理
    let chatAppInstance = null;

    // ============================================
    // 默认应用列表
    // ============================================
    const DEFAULT_APPS = [
        { id: 'phone', name: '电话', icon: '📞', useImage: false },
        { id: 'chat', name: '聊天', icon: '💬', useImage: false },
        { id: 'safari', name: 'Safari', icon: '🧭', useImage: false },
        { id: 'music', name: '音乐', icon: '🎵', useImage: false },
        { id: 'camera', name: '相机', icon: '📷', useImage: false },
        { id: 'calendar', name: '日历', icon: '📅', useImage: false },
        { id: 'settings', name: '设置', icon: 'settings', useImage: true },
        { id: 'wangwang', name: '汪汪', icon: '🐶', useImage: false }
    ];

    // 当前应用顺序（可变）
    let currentApps = [...DEFAULT_APPS];

    // 编辑模式状态
    let isEditMode = false;

    // 长按计时器
    let longPressTimer = null;
    const LONG_PRESS_DURATION = 500; // ms

    // 拖拽状态
    let isDragging = false;
    let draggedElement = null;
    let draggedIndex = -1;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    // ============================================
    // 初始化
    // ============================================
    await licenseManager.initialize();
    await layoutManager.initialize();

    // 加载保存的布局
    const savedLayout = await layoutManager.getLayout();
    if (savedLayout.length > 0) {
        const gridItems = savedLayout.filter(i => i.area === 'grid').sort((a, b) => a.position - b.position);
        const orderedApps = [];
        for (const layoutItem of gridItems) {
            const app = DEFAULT_APPS.find(a => a.id === layoutItem.appId);
            if (app) orderedApps.push(app);
        }
        // 补充没有保存的新应用
        for (const app of DEFAULT_APPS) {
            if (!orderedApps.find(a => a.id === app.id)) {
                orderedApps.push(app);
            }
        }
        currentApps = orderedApps;
    }

    // 渲染应用
    renderAppGrid();
    renderDock();

    // 恢复激活状态
    refreshActivationUI();

    // ============================================
    // 应用网格渲染
    // ============================================
    function renderAppGrid() {
        const grid = document.getElementById('app-grid');
        grid.innerHTML = '';

        currentApps.forEach((app, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'app-icon-wrapper' + (isEditMode ? ' edit-mode' : '');
            wrapper.dataset.index = index;
            wrapper.dataset.appId = app.id;

            const iconDiv = document.createElement('div');
            iconDiv.className = 'app-icon';

            if (app.useImage) {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const picture = document.createElement('picture');
                const source = document.createElement('source');
                source.srcset = 'Setting_Dark.png';
                source.media = '(prefers-color-scheme: dark)';
                const img = document.createElement('img');
                img.src = 'Setting_Light.png';
                img.alt = app.name;
                img.className = 'settings-icon-img';
                picture.appendChild(source);
                picture.appendChild(img);
                iconDiv.appendChild(picture);
            } else {
                iconDiv.textContent = app.icon;
            }

            const nameDiv = document.createElement('div');
            nameDiv.className = 'app-name';
            nameDiv.textContent = app.name;

            wrapper.appendChild(iconDiv);
            wrapper.appendChild(nameDiv);

            // 事件绑定
            setupDragEvents(wrapper, index);

            grid.appendChild(wrapper);
        });
    }

    function renderDock() {
        const dock = document.getElementById('dock-bar');
        dock.innerHTML = '';

        currentApps.slice(0, 4).forEach(app => {
            const iconDiv = document.createElement('div');
            iconDiv.className = 'app-icon';

            if (app.useImage) {
                const picture = document.createElement('picture');
                const source = document.createElement('source');
                source.srcset = 'Setting_Dark.png';
                source.media = '(prefers-color-scheme: dark)';
                const img = document.createElement('img');
                img.src = 'Setting_Light.png';
                img.alt = app.name;
                img.className = 'settings-icon-img-dock';
                picture.appendChild(source);
                picture.appendChild(img);
                iconDiv.appendChild(picture);
            } else {
                iconDiv.textContent = app.icon;
            }

            dock.appendChild(iconDiv);
        });
    }

    // ============================================
    // 长按 + 拖拽事件
    // ============================================
    function setupDragEvents(element, index) {
        // 鼠标事件
        element.addEventListener('mousedown', (e) => onPointerDown(e, element, index));
        element.addEventListener('mousemove', (e) => onPointerMove(e, element));
        element.addEventListener('mouseup', (e) => onPointerUp(e, element, index));
        element.addEventListener('mouseleave', (e) => onPointerCancel(e));

        // 触摸事件
        element.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            onPointerDown({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} }, element, index);
        }, { passive: false });

        element.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            onPointerMove({ clientX: touch.clientX, clientY: touch.clientY }, element);
        }, { passive: false });

        element.addEventListener('touchend', (e) => {
            onPointerUp(e, element, index);
        });

        element.addEventListener('touchcancel', (e) => {
            onPointerCancel(e);
        });
    }

    function onPointerDown(e, element, index) {
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        draggedIndex = index;

        // 启动长按计时器
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
            if (!isEditMode) {
                enterEditMode();
            }
            // 开始拖拽
            startDrag(element, index);
        }, LONG_PRESS_DURATION);

        // 如果已经在编辑模式，准备立即拖拽
        if (isEditMode) {
            clearTimeout(longPressTimer);
            longPressTimer = setTimeout(() => {
                startDrag(element, index);
            }, 150); // 编辑模式下更短的延迟
        }
    }

    function onPointerMove(e, element) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;

        // 移动超过阈值取消长按
        if (!isDragging && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
            clearTimeout(longPressTimer);
        }

        if (isDragging && draggedElement) {
            dragOffsetX = dx;
            dragOffsetY = dy;
            draggedElement.style.transform = `translate(${dragOffsetX}px, ${dragOffsetY}px) scale(1.15)`;
            draggedElement.style.zIndex = '100';

            // 计算目标位置
            const grid = document.getElementById('app-grid');
            const gridRect = grid.getBoundingClientRect();
            const cellWidth = gridRect.width / 4;
            const cellHeight = 105;

            const currentCenterX = e.clientX - gridRect.left;
            const currentCenterY = e.clientY - gridRect.top;

            const targetCol = Math.max(0, Math.min(3, Math.floor(currentCenterX / cellWidth)));
            const targetRow = Math.max(0, Math.floor(currentCenterY / cellHeight));
            const targetIndex = Math.min(currentApps.length - 1, Math.max(0, targetRow * 4 + targetCol));

            // 高亮目标位置
            document.querySelectorAll('.app-icon-wrapper.drop-target').forEach(el => {
                el.classList.remove('drop-target');
            });

            if (targetIndex !== draggedIndex && targetIndex >= 0 && targetIndex < currentApps.length) {
                const targetEl = grid.children[targetIndex];
                if (targetEl && targetEl !== draggedElement) {
                    targetEl.classList.add('drop-target');
                }

                // 交换位置
                const movedApp = currentApps.splice(draggedIndex, 1)[0];
                currentApps.splice(targetIndex, 0, movedApp);

                // 更新拖拽参考
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                dragOffsetX = 0;
                dragOffsetY = 0;
                draggedIndex = targetIndex;

                // 重新渲染（但保持拖拽状态）
                renderAppGridDuringDrag(targetIndex);
            }
        }
    }

    function onPointerUp(e, element, index) {
        clearTimeout(longPressTimer);

        if (isDragging) {
            finishDrag();
        } else if (!isEditMode) {
            // 普通点击
            const app = currentApps[index];
            if (app && app.id === 'settings') {
                showSettings();
            } else if (app && app.id === 'chat') {
                openChatApp();
            }
        }
    }

    function onPointerCancel(e) {
        clearTimeout(longPressTimer);
        if (isDragging) {
            finishDrag();
        }
    }

    function startDrag(element, index) {
        isDragging = true;
        draggedElement = element;
        draggedIndex = index;
        dragOffsetX = 0;
        dragOffsetY = 0;

        element.classList.add('dragging');
        element.style.transition = 'none';

        // 震动反馈（移动端）
        if (navigator.vibrate) {
            navigator.vibrate(50);
        }
    }

    function finishDrag() {
        isDragging = false;

        if (draggedElement) {
            draggedElement.classList.remove('dragging');
            draggedElement.style.transform = '';
            draggedElement.style.zIndex = '';
            draggedElement.style.transition = '';
            draggedElement = null;
        }

        document.querySelectorAll('.app-icon-wrapper.drop-target').forEach(el => {
            el.classList.remove('drop-target');
        });

        draggedIndex = -1;
        dragOffsetX = 0;
        dragOffsetY = 0;

        renderAppGrid();
        renderDock();
        saveLayout();
    }

    /**
     * 拖拽过程中重新渲染（保持被拖拽元素的状态）
     */
    function renderAppGridDuringDrag(activeIndex) {
        const grid = document.getElementById('app-grid');
        grid.innerHTML = '';

        currentApps.forEach((app, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'app-icon-wrapper edit-mode';
            wrapper.dataset.index = index;
            wrapper.dataset.appId = app.id;

            if (index === activeIndex) {
                wrapper.classList.add('dragging');
                wrapper.style.transition = 'none';
                draggedElement = wrapper;
            }

            const iconDiv = document.createElement('div');
            iconDiv.className = 'app-icon';

            if (app.useImage) {
                const picture = document.createElement('picture');
                const source = document.createElement('source');
                source.srcset = 'Setting_Dark.png';
                source.media = '(prefers-color-scheme: dark)';
                const img = document.createElement('img');
                img.src = 'Setting_Light.png';
                img.alt = app.name;
                img.className = 'settings-icon-img';
                picture.appendChild(source);
                picture.appendChild(img);
                iconDiv.appendChild(picture);
            } else {
                iconDiv.textContent = app.icon;
            }

            const nameDiv = document.createElement('div');
            nameDiv.className = 'app-name';
            nameDiv.textContent = app.name;

            wrapper.appendChild(iconDiv);
            wrapper.appendChild(nameDiv);

            setupDragEvents(wrapper, index);

            grid.appendChild(wrapper);
        });
    }

    // ============================================
    // 编辑模式
    // ============================================
    function enterEditMode() {
        isEditMode = true;
        document.getElementById('edit-banner').classList.add('active');
        renderAppGrid();
    }

    function exitEditMode() {
        isEditMode = false;
        document.getElementById('edit-banner').classList.remove('active');
        renderAppGrid();
        renderDock();
        saveLayout();
    }

    document.getElementById('edit-done-btn').addEventListener('click', () => {
        exitEditMode();
    });

    // 点击空白区域退出编辑模式
    document.getElementById('home-screen').addEventListener('click', (e) => {
        if (isEditMode && e.target.id === 'home-screen') {
            exitEditMode();
        }
    });

    // ============================================
    // 布局持久化
    // ============================================
    async function saveLayout() {
        const items = currentApps.map((app, index) => ({
            appId: app.id,
            position: index,
            area: 'grid'
        }));
        await layoutManager.saveLayout(items);
    }

    // ============================================
    // 授权相关
    // ============================================
    function refreshActivationUI() {
        if (licenseManager.isActivated()) {
            const statusEls = document.querySelectorAll('.status-val');
            statusEls.forEach(el => el.textContent = "已查看 >");
            const expiryEl = document.getElementById('expiry-date-web');
            if (expiryEl) {
                expiryEl.textContent = `有效期至: ${licenseManager.getExpirationDateString()}`;
                expiryEl.style.display = 'block';
            }
        }
    }

    window.unlock = function() {
        document.getElementById('lock-screen').classList.add('unlocked');
    }

    window.showSettings = function() {
        document.getElementById('settings-overlay').style.display = 'flex';
    }

    window.hideSettings = function() {
        document.getElementById('settings-overlay').style.display = 'none';
    }

    window.showDisplaySettings = function() {
        document.getElementById('display-settings-overlay').style.display = 'flex';
        updateWallpaperPreviews();
    }

    window.hideDisplaySettings = function() {
        document.getElementById('display-settings-overlay').style.display = 'none';
    }

    let pendingWallpaperType = 'lock';
    window.selectWallpaper = function(type) {
        pendingWallpaperType = type;
        document.getElementById('wallpaper-input').click();
    }

    window.handleWallpaperUpload = function(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const imageData = e.target.result;
            localStorage.setItem(`wallpaper_${pendingWallpaperType}`, imageData);
            updateWallpaperPreviews();
            applyWallpapers();
        };
        reader.readAsDataURL(file);
    }

    function updateWallpaperPreviews() {
        ['lock', 'home'].forEach(type => {
            const data = localStorage.getItem(`wallpaper_${type}`);
            const preview = document.getElementById(`${type}-wp-preview`);
            const status = document.getElementById(`${type}-wp-status`);
            if (data) {
                preview.innerHTML = `<img src="${data}" style="width: 100%; height: 100%; object-fit: cover;">`;
                status.textContent = "已设置，点击更换";
            }
        });
    }

    function applyWallpapers() {
        const lockWp = localStorage.getItem('wallpaper_lock');
        const homeWp = localStorage.getItem('wallpaper_home');
        
        if (lockWp) {
            document.getElementById('lock-screen').style.background = `url(${lockWp}) no-repeat center center`;
            document.getElementById('lock-screen').style.backgroundSize = 'cover';
        }
        if (homeWp) {
            document.getElementById('phone-container').style.background = `url(${homeWp}) no-repeat center center`;
            document.getElementById('phone-container').style.backgroundSize = 'cover';
        }
    }
    applyWallpapers();

    window.showActivation = function() {
        document.getElementById('activation-overlay').style.zIndex = 300;
        document.getElementById('activation-overlay').style.display = 'flex';
        document.getElementById('web-machine-id').textContent = licenseManager.getMachineId();
    }

    window.copyMachineId = function() {
        const text = document.getElementById('web-machine-id').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('机器码已复制');
        });
    }

    window.pasteLicenseKey = function() {
        navigator.clipboard.readText().then(text => {
            document.getElementById('license-key-input').value = text;
        });
    }

    window.hideActivation = function() {
        document.getElementById('activation-overlay').style.display = 'none';
    }

    window.addEventListener('popstate', function(event) {
        if (document.getElementById('activation-overlay').style.display === 'flex') {
            hideActivation();
            history.pushState(null, null, null);
        } else if (document.getElementById('settings-overlay').style.display === 'flex') {
            hideSettings();
            history.pushState(null, null, null);
        }
    });
    history.pushState(null, null, null);

    window.submitActivation = async function() {
        const license = document.getElementById('license-key-input').value?.trim();
        if (!license) {
            alert('请输入激活码。');
            return;
        }

        const result = await licenseManager.verifyLicense(license);
        if (result.success) {
            alert('软件激活成功！');
            refreshActivationUI();
            hideActivation();
        } else {
            alert(`激活失败: ${result.error}`);
        }
    }

    // ============================================
    // 时钟更新
    // ============================================
    function updateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timeStr = `${hours}:${minutes}`;

        document.querySelectorAll('.time, .lock-time').forEach(el => el.textContent = timeStr);

        const widgetTime = document.getElementById('widget-time');
        if (widgetTime) widgetTime.textContent = timeStr;

        const widgetDate = document.getElementById('widget-date');
        if (widgetDate) {
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const day = days[now.getDay()];
            widgetDate.textContent = `${month}月${date}日 ${day}`;
        }
    }
    setInterval(updateTime, 1000);
    updateTime();

    // ============================================
    // 天气初始化
    // ============================================
    async function initWeatherWidget() {
        try {
            const city = await getLocation();
            document.querySelectorAll('.widget-city').forEach(el => el.textContent = city);
            const weatherWidget = document.querySelector('.weather-widget');
            if (weatherWidget) {
                const cityEl = weatherWidget.querySelector('div > div:first-child');
                if (cityEl) cityEl.textContent = city;
            }

            if (city) {
                const weather = await getWeather(city);
                if (weatherWidget) {
                    const tempEl = weatherWidget.querySelector('.widget-temp');
                    const statusEl = weatherWidget.querySelector('.widget-status');
                    const rangeEl = weatherWidget.querySelector('.widget-range');

                    if (tempEl) tempEl.textContent = weather.temperature.replace(' ', '');
                    if (statusEl) statusEl.textContent = weather.description;
                    if (weather.forecast && weather.forecast.length > 0) {
                        rangeEl.textContent = `Wind: ${weather.wind}`;
                    }
                }
            }
        } catch (error) {
            console.error('获取环境信息失败:', error);
        }
    }
    initWeatherWidget();

    // ============================================
    // 聊天App
    // ============================================
    function openChatApp() {
        const container = document.getElementById('chat-app-container');
        container.style.display = 'block';
        chatAppInstance = new ChatApp(container, () => {
            container.style.display = 'none';
            chatAppInstance = null;
        });
    }
    window.openChatApp = openChatApp;
</script>
