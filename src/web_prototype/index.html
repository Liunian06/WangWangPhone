<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汪汪机 - iOS 桌面原型</title>
    <link rel="stylesheet" href="css/chat.css">
    <style>
        :root {
            --ios-radius: 20px;
            --dock-bg: rgba(255, 255, 255, 0.3);
            --text-color: white;
            --bg-color: #F2F2F7;
            --card-bg: white;
            --system-text: black;
            --header-bg: white;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #1C1C1E; --card-bg: #2C2C2E; --system-text: white; --header-bg: #2C2C2E; }
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; background-color: #000; user-select: none; -webkit-user-select: none;
        }
        #phone-container {
            position: relative; width: 375px; height: 812px; margin: 20px auto;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center;
            background-size: cover; border-radius: 40px;
            box-shadow: 0 0 0 10px #333, 0 0 20px rgba(0,0,0,0.5); overflow: hidden;
        }
        .status-bar {
            position: absolute; top: 0; width: 100%; height: 44px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box;
            color: var(--text-color); font-size: 14px; font-weight: 600; z-index: 100;
        }
        .status-right { display: flex; gap: 5px; }
        #lock-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 100px; z-index: 50; transition: transform 0.5s ease-in-out; background: inherit;
        }
        #lock-screen.unlocked { transform: translateY(-100%); }
        .lock-time { font-size: 80px; font-weight: 200; color: var(--text-color); }
        .lock-date { font-size: 20px; margin-top: -10px; color: var(--text-color); }
        .unlock-hint { position: absolute; bottom: 50px; color: var(--text-color); font-size: 16px; animation: breathe 2s infinite; cursor: pointer; }
        @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; padding-top: 60px; box-sizing: border-box;
        }
        .widgets-area {
            display: flex; gap: 15px; padding: 0 20px;
            margin-top: 10px; margin-bottom: 10px; position: relative; z-index: 5;
        }
        .widget {
            flex: 1; height: 150px; border-radius: 20px; padding: 15px; box-sizing: border-box;
            color: white; display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); touch-action: none; transition: transform 0.2s ease;
        }
        .widget.edit-mode { cursor: grab; }
        .widget.edit-mode:nth-child(odd) { animation: wiggle1 0.3s ease-in-out infinite; }
        .widget.edit-mode:nth-child(even) { animation: wiggle2 0.28s ease-in-out infinite; }
        .widget.widget-dragging { animation: none !important; opacity: 0.3; }
        .widget.drop-target { transform: scale(0.92); opacity: 0.6; }
        .clock-widget { background: linear-gradient(135deg, #E0C3FC 0%, #8EC5FC 100%); }
        .weather-widget { background: linear-gradient(135deg, #4FACFE 0%, #00F2FE 100%); }
        .widget-date { font-size: 12px; font-weight: 500; }
        .widget-time { font-size: 40px; font-weight: bold; }
        .widget-city { font-size: 10px; opacity: 0.8; }
        .widget-temp { font-size: 40px; font-weight: 300; }
        .widget-icon { font-size: 24px; }
        .widget-status { font-size: 12px; }
        .widget-range { font-size: 10px; opacity: 0.8; }

        /* 编辑模式提示栏 - 只有完成按钮，无提示文字 */
        .edit-banner {
            display: none; align-items: center; justify-content: flex-end;
            margin: 0 20px 8px 20px; padding: 10px 16px;
            background: rgba(255,255,255,0.15); border-radius: 12px;
        }
        .edit-banner.active { display: flex; }
        .edit-banner .done-btn { color: #007AFF; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* 应用网格 - 4x6固定网格，绝对定位 */
        .app-grid { position: relative; flex: 1; margin: 0 20px; }

        .app-icon-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            cursor: pointer; position: absolute;
            transition: left 0.25s ease, top 0.25s ease; touch-action: none;
        }
        .app-icon-wrapper.dragging { opacity: 0.3; transition: none; }

        /* 拖拽浮层 - z-index: 10000 确保在最顶层 */
        .drag-overlay {
            position: fixed; pointer-events: none; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            opacity: 0.85; transform: scale(1.15);
        }
        .drag-overlay .app-icon { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 48px; }
        .drag-overlay .app-name { color: white; font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .drag-overlay .settings-icon-img, .drag-overlay .settings-icon-img-dock { width: 60px; height: 60px; object-fit: contain; }

        /* 网格吸附高亮 */
        .grid-cell-highlight {
            position: absolute; border-radius: 15px;
            background: rgba(255,255,255,0.15); border: 2px dashed rgba(255,255,255,0.4);
            pointer-events: none; transition: all 0.15s ease;
        }

        @keyframes wiggle1 { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
        @keyframes wiggle2 { 0%, 100% { transform: rotate(1.5deg); } 50% { transform: rotate(-1.5deg); } }
        .app-icon-wrapper.edit-mode:nth-child(odd) { animation: wiggle1 0.3s ease-in-out infinite; }
        .app-icon-wrapper.edit-mode:nth-child(even) { animation: wiggle2 0.28s ease-in-out infinite; }
        .app-icon-wrapper.edit-mode.dragging { animation: none !important; }

        .app-icon { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 48px; }
        .dock .app-icon { font-size: 48px; }
        .app-name { color: white; font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

        /* Dock 栏 - z-index: 20 */
        .dock {
            position: absolute; bottom: 20px; left: 15px; right: 15px; height: 90px;
            background: var(--dock-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; display: flex; justify-content: space-around; align-items: center;
            padding: 0 10px; z-index: 20;
        }
        .home-indicator {
            position: absolute; bottom: 8px; width: 120px; height: 5px;
            background: white; border-radius: 5px; left: 50%; transform: translateX(-50%); opacity: 0.8;
        }

        .settings-icon-img { width: 60px; height: 60px; object-fit: contain; }
        .settings-icon-img-dock { width: 60px; height: 60px; object-fit: contain; }

        /* Overlay样式 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 200; display: none; flex-direction: column;
        }
        .overlay-header {
            height: 60px; background: var(--header-bg); display: flex; align-items: center;
            justify-content: center; position: relative;
            border-bottom: 1px solid rgba(0,0,0,0.1); color: var(--system-text);
        }
        .back-btn { position: absolute; left: 15px; color: #007AFF; cursor: pointer; font-size: 16px; }
        .overlay-content { padding: 20px; flex: 1; overflow-y: auto; }
        .settings-section { margin-bottom: 20px; }
        .section-title { font-size: 13px; color: #666; margin-left: 10px; margin-bottom: 5px; }
        .settings-list { background: var(--card-bg); border-radius: 10px; overflow: hidden; color: var(--system-text); }
        .settings-item { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .settings-item:last-child { border-bottom: none; }
        .status-val { color: #8E8E93; }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 14px; color: #666; margin-bottom: 5px; }
        .input-box { background: var(--card-bg); border-radius: 10px; padding: 12px; word-break: break-all; min-height: 20px; color: var(--system-text); }
        textarea.input-box { width: 100%; border: none; height: 100px; box-sizing: border-box; font-family: inherit; resize: none; background: var(--card-bg); color: var(--system-text); }
        .btn-primary { background: #007AFF; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
<div id="phone-container">
    <div class="status-bar">
        <div class="time">09:41</div>
        <div class="status-right"><span>📶</span><span>5G</span><span>🔋</span></div>
    </div>
    <div id="lock-screen" onclick="unlock()">
        <div class="lock-time">09:41</div>
        <div class="lock-date">2月3日 星期二</div>
        <div class="unlock-hint">点击屏幕解锁</div>
    </div>
    <div id="home-screen">
        <div class="widgets-area"></div>
        <div class="edit-banner" id="edit-banner">
            <span class="done-btn" id="edit-done-btn">完成</span>
        </div>
        <div class="app-grid" id="app-grid"></div>
        <div class="dock" id="dock-bar"></div>
        <div class="home-indicator"></div>
    </div>

    <!-- 设置 Overlay -->
    <div id="settings-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideSettings()">返回</div>
            <div style="font-weight: 600;">设置</div>
        </div>
        <div class="overlay-content">
            <div class="settings-section">
                <div class="section-title">激活与授权</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="showActivation()">
                        <div style="display: flex; flex-direction: column;">
                            <span>软件激活</span>
                            <span id="expiry-date-web" style="font-size: 11px; color: #8E8E93; display: none;">有效期至: 2030-01-01</span>
                        </div>
                        <span class="status-val">未激活 ></span>
                    </div>
                </div>
            </div>
            <div class="settings-section">
                <div class="section-title">外观</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="showDisplaySettings()">
                        <span>显示设置</span><span class="status-val">></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 激活 Overlay -->
    <div id="activation-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideActivation()">取消</div>
            <div style="font-weight: 600;">激活授权</div>
        </div>
        <div class="overlay-content">
            <div class="input-group">
                <div class="input-label">机器码</div>
                <div id="web-machine-id" class="input-box" style="margin-bottom: 10px;">WEB-ID-FETCHING...</div>
                <button class="btn-primary" style="background: #34C759; margin-bottom: 20px; padding: 10px; font-size: 14px;" onclick="copyMachineId()">复制机器码</button>
            </div>
            <div class="input-group">
                <div class="input-label">激活码</div>
                <textarea id="license-key-input" class="input-box" style="margin-bottom: 10px;" placeholder="请输入激活码..."></textarea>
                <button class="btn-primary" style="background: #5856D6; margin-bottom: 20px; padding: 10px; font-size: 14px;" onclick="pasteLicenseKey()">粘贴激活码</button>
            </div>
            <button class="btn-primary" onclick="submitActivation()">激活</button>
        </div>
    </div>

    <!-- 显示设置 Overlay -->
    <div id="display-settings-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideDisplaySettings()">返回</div>
            <div style="font-weight: 600;">显示设置</div>
        </div>
        <div class="overlay-content">
            <div class="settings-section">
                <div class="section-title">锁屏壁纸</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="selectWallpaper('lock')">
                        <div style="display: flex; flex-direction: column;">
                            <span>锁屏壁纸设置</span>
                            <span id="lock-wp-status" style="font-size: 11px; color: #8E8E93;">点击更换</span>
                        </div>
                        <div id="lock-wp-preview" style="width: 50px; height: 50px; background: #eee; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center;">🖼️</div>
                    </div>
                </div>
            </div>
            <div class="settings-section">
                <div class="section-title">桌面壁纸</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="selectWallpaper('home')">
                        <div style="display: flex; flex-direction: column;">
                            <span>桌面壁纸设置</span>
                            <span id="home-wp-status" style="font-size: 11px; color: #8E8E93;">点击更换</span>
                        </div>
                        <div id="home-wp-preview" style="width: 50px; height: 50px; background: #eee; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center;">🖼️</div>
                    </div>
                </div>
            </div>
            <input type="file" id="wallpaper-input" style="display: none;" accept="image/*" onchange="handleWallpaperUpload(this)">
        </div>
    </div>

    <!-- 聊天App容器 -->
    <div id="chat-app-container" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:250;display:none;"></div>
</div>

<script type="module">
    import { initHomeScreen } from './js/homescreen.js';
    await initHomeScreen();
</script>
</body>
</html>
