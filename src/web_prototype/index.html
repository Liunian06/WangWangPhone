<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汪汪机 - iOS 桌面原型</title>
    <style>
        :root {
            --ios-radius: 20px;
            --dock-bg: rgba(255, 255, 255, 0.3);
            --text-color: white;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        #phone-container {
            position: relative;
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            border-radius: 40px;
            box-shadow: 0 0 0 10px #333, 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 状态栏 */
        .status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
        }

        .status-right {
            display: flex;
            gap: 5px;
        }

        /* 锁屏界面 */
        #lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 100px;
            z-index: 50;
            transition: transform 0.5s ease-in-out;
            background: inherit;
        }

        #lock-screen.unlocked {
            transform: translateY(-100%);
        }

        .lock-time {
            font-size: 80px;
            font-weight: 200;
            color: var(--text-color);
        }

        .lock-date {
            font-size: 20px;
            margin-top: -10px;
            color: var(--text-color);
        }

        .unlock-hint {
            position: absolute;
            bottom: 50px;
            color: var(--text-color);
            font-size: 16px;
            animation: breathe 2s infinite;
            cursor: pointer;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 桌面界面 */
        #home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            box-sizing: border-box;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px;
            padding: 20px;
        }

        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .app-name {
            color: white;
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Dock 栏 */
        .dock {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            height: 90px;
            background: var(--dock-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            width: 120px;
            height: 5px;
            background: white;
            border-radius: 5px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="phone-container">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="time">09:41</div>
        <div class="status-right">
            <span>📶</span>
            <span>5G</span>
            <span>🔋</span>
        </div>
    </div>

    <!-- 锁屏界面 -->
    <div id="lock-screen" onclick="unlock()">
        <div class="lock-time">09:41</div>
        <div class="lock-date">2月3日 星期二</div>
        <div class="unlock-hint">点击屏幕解锁</div>
    </div>

    <!-- 桌面界面 -->
    <div id="home-screen">
        <div class="app-grid">
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);">📞</div>
                <div class="app-name">电话</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);">💬</div>
                <div class="app-name">信息</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);">🧭</div>
                <div class="app-name">Safari</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);">🎵</div>
                <div class="app-name">音乐</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: #fff;">📷</div>
                <div class="app-name">相机</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: #fff;">📅</div>
                <div class="app-name">日历</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: #fff;">⚙️</div>
                <div class="app-name">设置</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: #fff;">🐶</div>
                <div class="app-name">汪汪</div>
            </div>
        </div>

        <!-- Dock 栏 -->
        <div class="dock">
            <div class="app-icon" style="width: 55px; height: 55px;">📞</div>
            <div class="app-icon" style="width: 55px; height: 55px;">💬</div>
            <div class="app-icon" style="width: 55px; height: 55px;">🧭</div>
            <div class="app-icon" style="width: 55px; height: 55px;">🎵</div>
        </div>

        <div class="home-indicator"></div>
    </div>
</div>

<script>
    function unlock() {
        document.getElementById('lock-screen').classList.add('unlocked');
    }

    // 更新时间
    function updateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timeStr = `${hours}:${minutes}`;
        document.querySelectorAll('.time, .lock-time').forEach(el => el.textContent = timeStr);
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
