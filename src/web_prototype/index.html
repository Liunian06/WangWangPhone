<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汪汪机 - iOS 桌面原型</title>
    <link rel="stylesheet" href="css/chat.css">
    <style>
        :root {
            --ios-radius: 20px;
            --dock-bg: rgba(255, 255, 255, 0.3);
            --text-color: white;
            --bg-color: #F2F2F7;
            --card-bg: white;
            --system-text: black;
            --header-bg: white;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1C1C1E;
                --card-bg: #2C2C2E;
                --system-text: white;
                --header-bg: #2C2C2E;
            }
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
            user-select: none;
            -webkit-user-select: none;
        }

        #phone-container {
            position: relative;
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            border-radius: 40px;
            box-shadow: 0 0 0 10px #333, 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 状态栏 */
        .status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
        }

        .status-right {
            display: flex;
            gap: 5px;
        }

        /* 锁屏界面 */
        #lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 100px;
            z-index: 50;
            transition: transform 0.5s ease-in-out;
            background: inherit;
        }

        #lock-screen.unlocked {
            transform: translateY(-100%);
        }

        .lock-time {
            font-size: 80px;
            font-weight: 200;
            color: var(--text-color);
        }

        .lock-date {
            font-size: 20px;
            margin-top: -10px;
            color: var(--text-color);
        }

        .unlock-hint {
            position: absolute;
            bottom: 50px;
            color: var(--text-color);
            font-size: 16px;
            animation: breathe 2s infinite;
            cursor: pointer;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 桌面界面 */
        #home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            box-sizing: border-box;
        }

        /* 小组件区域 */
        .widgets-area {
            display: flex;
            gap: 15px;
            padding: 0 20px;
            margin-top: 10px;
            margin-bottom: 10px;
            position: relative;
        }

        .widget {
            flex: 1;
            height: 150px;
            border-radius: 20px;
            padding: 15px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            touch-action: none;
            transition: transform 0.2s ease;
        }

        .widget.edit-mode {
            cursor: grab;
        }

        .widget.edit-mode:nth-child(odd) {
            animation: wiggle1 0.3s ease-in-out infinite;
        }
        .widget.edit-mode:nth-child(even) {
            animation: wiggle2 0.28s ease-in-out infinite;
        }

        .widget.widget-dragging {
            animation: none !important;
            opacity: 0.3;
            z-index: 1000;
            position: relative;
        }

        .widget.drop-target {
            transform: scale(0.92);
            opacity: 0.6;
        }

        .clock-widget {
            background: linear-gradient(135deg, #E0C3FC 0%, #8EC5FC 100%);
        }

        .weather-widget {
            background: linear-gradient(135deg, #4FACFE 0%, #00F2FE 100%);
        }

        .widget-date { font-size: 12px; font-weight: 500; }
        .widget-time { font-size: 40px; font-weight: bold; }
        .widget-city { font-size: 10px; opacity: 0.8; }
        .widget-temp { font-size: 40px; font-weight: 300; }
        .widget-icon { font-size: 24px; }
        .widget-status { font-size: 12px; }
        .widget-range { font-size: 10px; opacity: 0.8; }

        /* 编辑模式完成按钮（浮动在右上角） */
        .edit-done-floating {
            display: none;
            position: absolute;
            top: 55px;
            right: 25px;
            z-index: 500;
            color: #007AFF;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 16px;
        }

        .edit-done-floating.active {
            display: block;
        }

        /* 应用网格 - 4x6固定网格 */
        .app-grid {
            position: relative;
            width: calc(100% - 40px);
            margin: 0 20px;
            flex: 1;
        }

        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            position: absolute;
            transition: left 0.3s ease, top 0.3s ease, transform 0.2s ease;
            touch-action: none;
        }

        .app-icon-wrapper.dragging {
            opacity: 0.3;
            transition: none;
        }

        /* 拖拽浮层 - 确保在最顶层 */
        .drag-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: 0.85;
            transform: scale(1.15);
        }

        .drag-overlay .app-icon {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
        }

        .drag-overlay .app-name {
            color: white;
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .drag-overlay .settings-icon-img,
        .drag-overlay .settings-icon-img-dock {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .app-icon-wrapper.drop-target {
            transform: scale(0.85);
        }

        /* iOS 编辑模式抖动动画 */
        @keyframes wiggle1 {
            0%, 100% { transform: rotate(-1.5deg); }
            50% { transform: rotate(1.5deg); }
        }
        @keyframes wiggle2 {
            0%, 100% { transform: rotate(1.5deg); }
            50% { transform: rotate(-1.5deg); }
        }

        .app-icon-wrapper.edit-mode:nth-child(odd) {
            animation: wiggle1 0.3s ease-in-out infinite;
        }
        .app-icon-wrapper.edit-mode:nth-child(even) {
            animation: wiggle2 0.28s ease-in-out infinite;
        }
        .app-icon-wrapper.edit-mode.dragging {
            animation: none !important;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
        }

        .dock .app-icon {
            font-size: 48px;
        }

        .app-name {
            color: white;
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Dock 栏 */
        .dock {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            height: 90px;
            background: var(--dock-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            z-index: 10;
        }

        /* 小组件拖拽浮层 */
        .drag-overlay-widget {
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            opacity: 0.85;
            transform: scale(1.05);
            border-radius: 20px;
            padding: 15px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            width: 120px;
            height: 5px;
            background: white;
            border-radius: 5px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
        }

        /* 设置界面覆盖层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .overlay-header {
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            color: var(--system-text);
        }

        .back-btn {
            position: absolute;
            left: 15px;
            color: #007AFF;
            cursor: pointer;
            font-size: 16px;
        }

        .overlay-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .settings-section { margin-bottom: 20px; }
        .section-title { font-size: 13px; color: #666; margin-left: 10px; margin-bottom: 5px; }

        .settings-list {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            color: var(--system-text);
        }

        .settings-item {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .settings-icon-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .settings-icon-img-dock {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .settings-item:last-child { border-bottom: none; }
        .status-val { color: #8E8E93; }

        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 14px; color: #666; margin-bottom: 5px; }

        .input-box {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px;
            word-break: break-all;
            min-height: 20px;
            color: var(--system-text);
        }

        textarea.input-box {
            width: 100%;
            border: none;
            height: 100px;
            box-sizing: border-box;
            font-family: inherit;
            resize: none;
            background: var(--card-bg);
            color: var(--system-text);
        }

        .btn-primary {
            background: #007AFF;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="phone-container">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="time">09:41</div>
        <div class="status-right">
            <span>📶</span>
            <span>5G</span>
            <span>🔋</span>
        </div>
    </div>

    <!-- 锁屏界面 -->
    <div id="lock-screen" onclick="unlock()">
        <div class="lock-time">09:41</div>
        <div class="lock-date">2月3日 星期二</div>
        <div class="unlock-hint">点击屏幕解锁</div>
    </div>

    <!-- 桌面界面 -->
    <div id="home-screen">
        <!-- 编辑模式完成按钮 -->
        <div class="edit-done-floating" id="edit-done-btn">完成</div>

        <!-- 小组件区域 -->
        <div class="widgets-area">
            <div class="widget clock-widget">
                <div class="widget-date" id="widget-date">10月1日 星期一</div>
                <div class="widget-time" id="widget-time">09:41</div>
                <div class="widget-city">北京</div>
            </div>
            <div class="widget weather-widget">
                <div>
                    <div style="font-weight: bold;">北京</div>
                    <div class="widget-temp">24°</div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <div class="widget-icon">☀️</div>
                        <div class="widget-status">晴朗</div>
                    </div>
                    <div class="widget-range">最高 28° 最低 18°</div>
                </div>
            </div>
        </div>

        <!-- 应用网格（4x6固定网格，动态渲染） -->
        <div class="app-grid" id="app-grid"></div>

        <!-- Dock 栏（动态渲染） -->
        <div class="dock" id="dock-bar"></div>

        <div class="home-indicator"></div>
    </div>

    <!-- 设置 Overlay -->
    <div id="settings-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideSettings()">返回</div>
            <div style="font-weight: 600;">设置</div>
        </div>
        <div class="overlay-content">
            <div class="settings-section">
                <div class="section-title">激活与授权</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="showActivation()">
                        <div style="display: flex; flex-direction: column;">
                            <span>软件激活</span>
                            <span id="expiry-date-web" style="font-size: 11px; color: #8E8E93; display: none;">有效期至: 2030-01-01</span>
                        </div>
                        <span class="status-val">未激活 ></span>
                    </div>
                </div>
            </div>
            <div class="settings-section">
                <div class="section-title">外观</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="showDisplaySettings()">
                        <span>显示设置</span>
                        <span class="status-val">></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 激活 Overlay -->
    <div id="activation-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideActivation()">取消</div>
            <div style="font-weight: 600;">激活授权</div>
        </div>
        <div class="overlay-content">
            <div class="input-group">
                <div class="input-label">机器码</div>
                <div id="web-machine-id" class="input-box" style="margin-bottom: 10px;">WEB-ID-FETCHING...</div>
                <button class="btn-primary" style="background: #34C759; margin-bottom: 20px; padding: 10px; font-size: 14px;" onclick="copyMachineId()">复制机器码</button>
            </div>
            <div class="input-group">
                <div class="input-label">激活码</div>
                <textarea id="license-key-input" class="input-box" style="margin-bottom: 10px;" placeholder="请输入激活码..."></textarea>
                <button class="btn-primary" style="background: #5856D6; margin-bottom: 20px; padding: 10px; font-size: 14px;" onclick="pasteLicenseKey()">粘贴激活码</button>
            </div>
            <button class="btn-primary" onclick="submitActivation()">激活</button>
        </div>
    </div>

    <!-- 显示设置 Overlay -->
    <div id="display-settings-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideDisplaySettings()">返回</div>
            <div style="font-weight: 600;">显示设置</div>
        </div>
        <div class="overlay-content">
            <div class="settings-section">
                <div class="section-title">锁屏壁纸</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="selectWallpaper('lock')">
                        <div style="display: flex; flex-direction: column;">
                            <span>锁屏壁纸设置</span>
                            <span id="lock-wp-status" style="font-size: 11px; color: #8E8E93;">点击更换</span>
                        </div>
                        <div id="lock-wp-preview" style="width: 50px; height: 50px; background: #eee; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center;">🖼️</div>
                    </div>
                </div>
            </div>
            <div class="settings-section">
                <div class="section-title">桌面壁纸</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="selectWallpaper('home')">
                        <div style="display: flex; flex-direction: column;">
                            <span>桌面壁纸设置</span>
                            <span id="home-wp-status" style="font-size: 11px; color: #8E8E93;">点击更换</span>
                        </div>
                        <div id="home-wp-preview" style="width: 50px; height: 50px; background: #eee; border-radius: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center;">🖼️</div>
                    </div>
                </div>
            </div>
            <input type="file" id="wallpaper-input" style="display: none;" accept="image/*" onchange="handleWallpaperUpload(this)">
        </div>
    </div>
    <!-- 聊天App容器 -->
    <div id="chat-app-container" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:250;display:none;"></div>
</div>

<script type="module">
    import { getLocation } from './js/location.js';
    import { getWeather } from './js/weather.js';
    import { licenseManager } from './js/license.js';
    import { layoutManager } from './js/layout.js';
    import { ChatApp } from './js/chat.js';

    // 聊天App实例管理
    let chatAppInstance = null;

    // ============================================
    // 默认应用列表
    // ============================================
    const DEFAULT_APPS = [
        { id: 'phone', name: '电话', icon: '📞', useImage: false },
        { id: 'chat', name: '聊天', icon: '💬', useImage: false },
        { id: 'safari', name: 'Safari', icon: '🧭', useImage: false },
        { id: 'music', name: '音乐', icon: '🎵', useImage: false },
        { id: 'camera', name: '相机', icon: '📷', useImage: false },
        { id: 'calendar', name: '日历', icon: '📅', useImage: false },
        { id: 'settings', name: '设置', icon: 'settings', useImage: true },
        { id: 'wangwang', name: '汪汪', icon: '🐶', useImage: false }
    ];

    // 当前主屏幕应用顺序（可变）- 每个app增加gridCol/gridRow属性
    let currentApps = [...DEFAULT_APPS];

    // 4x6 网格常量
    const GRID_COLS = 4;
    const GRID_ROWS_TOTAL = 4; // 小组件占前2行，应用占后4行

    // Dock栏应用（独立管理，初始为空，最多4个）
    let dockApps = [];
    const MAX_DOCK_APPS = 4;

    // 编辑模式状态
    let isEditMode = false;

    // 小组件顺序: ['clock', 'weather'] 可交换
    let widgetOrder = ['clock', 'weather'];

    // 长按计时器
    let longPressTimer = null;
    const LONG_PRESS_DURATION = 500; // ms

    // 拖拽状态
    let isDragging = false;
    let draggedElement = null;
    let draggedIndex = -1;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let dragSource = 'grid'; // 'grid', 'dock', 或 'widget'，标记拖拽来源

    // 拖拽浮层元素
    let dragOverlayEl = null;

    // ============================================
    // 初始化
    // ============================================
    await licenseManager.initialize();
    await layoutManager.initialize();

    // 加载保存的布局
    const savedLayout = await layoutManager.getLayout();
    if (savedLayout.length > 0) {
        // 加载主屏幕网格
        const gridItems = savedLayout.filter(i => i.area === 'grid').sort((a, b) => a.position - b.position);
        const orderedApps = [];
        for (const layoutItem of gridItems) {
            const app = DEFAULT_APPS.find(a => a.id === layoutItem.appId);
            if (app) orderedApps.push(app);
        }

        // 加载Dock栏
        const dockItems = savedLayout.filter(i => i.area === 'dock').sort((a, b) => a.position - b.position);
        dockApps = [];
        for (const layoutItem of dockItems) {
            const app = DEFAULT_APPS.find(a => a.id === layoutItem.appId);
            if (app) dockApps.push(app);
        }

        // 加载小组件顺序
        const widgetItems = savedLayout.filter(i => i.area === 'widget').sort((a, b) => a.position - b.position);
        if (widgetItems.length > 0) {
            widgetOrder = widgetItems.map(i => i.appId);
        }

        // 补充没有保存的新应用到主屏幕（排除已在dock中的）
        const allSavedIds = [...gridItems, ...dockItems].map(i => i.appId);
        for (const app of DEFAULT_APPS) {
            if (!allSavedIds.includes(app.id)) {
                orderedApps.push(app);
            }
        }
        currentApps = orderedApps;
    }

    // 渲染应用
    renderWidgets();
    renderAppGrid();
    renderDock();

    // 恢复激活状态
    refreshActivationUI();

    // ============================================
    // 小组件渲染与拖拽
    // ============================================
    function renderWidgets() {
        const widgetsArea = document.querySelector('.widgets-area');
        // 保存小组件的innerHTML模板
        const clockHTML = document.querySelector('.clock-widget') ? document.querySelector('.clock-widget').outerHTML : '';
        const weatherHTML = document.querySelector('.weather-widget') ? document.querySelector('.weather-widget').outerHTML : '';

        // 根据widgetOrder重新排列
        widgetsArea.innerHTML = '';
        widgetOrder.forEach((widgetId, index) => {
            let widgetEl;
            if (widgetId === 'clock') {
                widgetEl = createClockWidget();
            } else {
                widgetEl = createWeatherWidget();
            }
            widgetEl.dataset.widgetId = widgetId;
            widgetEl.dataset.widgetIndex = index;
            if (isEditMode) {
                widgetEl.classList.add('edit-mode');
            }
            setupWidgetDragEvents(widgetEl, index);
            widgetsArea.appendChild(widgetEl);
        });

        // 重新触发时钟更新
        updateTime();
    }

    function createClockWidget() {
        const widget = document.createElement('div');
        widget.className = 'widget clock-widget';
        widget.innerHTML = `
            <div class="widget-date" id="widget-date">--</div>
            <div class="widget-time" id="widget-time">--:--</div>
            <div class="widget-city">北京</div>
        `;
        return widget;
    }

    function createWeatherWidget() {

                </div>
                <div class="widget-range">最高 28° 最低 18°</div>
            </div>
        `;
        return widget;

    // 小组件拖拽事件 - 使用浮层确保在最上层
    function setupWidgetDragEvents(element, index) {
        let widgetDragStartX = 0;
        let widgetDragStartY = 0;
        let widgetIsDragging = false;
        let widgetLongPressTimer = null;
        let widgetDragOverlay = null;

        function createWidgetDragOverlay() {
            removeWidgetDragOverlay();
            widgetDragOverlay = element.cloneNode(true);
            widgetDragOverlay.className = 'drag-overlay-widget ' + (element.classList.contains('clock-widget') ? 'clock-widget' : 'weather-widget');
            const rect = element.getBoundingClientRect();
            widgetDragOverlay.style.left = rect.left + 'px';
            widgetDragOverlay.style.top = rect.top + 'px';
            widgetDragOverlay.style.width = rect.width + 'px';
            widgetDragOverlay.style.height = rect.height + 'px';
            document.body.appendChild(widgetDragOverlay);
        }

        function removeWidgetDragOverlay() {
            if (widgetDragOverlay && widgetDragOverlay.parentNode) {
                widgetDragOverlay.parentNode.removeChild(widgetDragOverlay);
            }
            widgetDragOverlay = null;
        }

        function onWidgetPointerDown(e) {
            widgetDragStartX = e.clientX;
            widgetDragStartY = e.clientY;

            clearTimeout(widgetLongPressTimer);
            widgetLongPressTimer = setTimeout(() => {
                if (!isEditMode) {
                    enterEditMode();
                }
                widgetIsDragging = true;
                isDragging = true;
                dragSource = 'widget';
                draggedIndex = index;
                draggedElement = element;
                dragOffsetX = 0;
                dragOffsetY = 0;
                dragStartX = e.clientX;
                dragStartY = e.clientY;

                element.classList.add('widget-dragging');
                createWidgetDragOverlay();

                if (navigator.vibrate) navigator.vibrate(50);
            }, isEditMode ? 150 : LONG_PRESS_DURATION);
        }

        function onWidgetPointerMove(e) {
            const dx = e.clientX - widgetDragStartX;
            const dy = e.clientY - widgetDragStartY;

            if (!widgetIsDragging && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
                clearTimeout(widgetLongPressTimer);
            }

            if (widgetIsDragging && draggedElement) {
                // 更新浮层位置
                if (widgetDragOverlay) {
                    const rect = element.getBoundingClientRect();
                    widgetDragOverlay.style.left = (e.clientX - rect.width / 2) + 'px';
                    widgetDragOverlay.style.top = (e.clientY - rect.height / 2) + 'px';
                }

                // 检查是否应该交换
                const widgetsArea = document.querySelector('.widgets-area');
                const widgets = widgetsArea.querySelectorAll('.widget');
                widgets.forEach((w, i) => {
                    if (w !== draggedElement) {
                        const rect = w.getBoundingClientRect();
                        const centerX = rect.left + rect.width / 2;
                        if (i !== draggedIndex && Math.abs(e.clientX - centerX) < rect.width / 3) {
                            w.classList.add('drop-target');
                        } else {
                            w.classList.remove('drop-target');
                        }
                    }
                });
            }
        }

        function onWidgetPointerUp(e) {
            clearTimeout(widgetLongPressTimer);

            if (widgetIsDragging) {
                const widgetsArea = document.querySelector('.widgets-area');
                const widgets = widgetsArea.querySelectorAll('.widget');
                let swapTarget = -1;
                widgets.forEach((w, i) => {
                    if (w.classList.contains('drop-target')) {
                        swapTarget = i;
                    }
                    w.classList.remove('drop-target');
                });

                if (swapTarget >= 0 && swapTarget !== draggedIndex) {
                    const temp = widgetOrder[draggedIndex];
                    widgetOrder[draggedIndex] = widgetOrder[swapTarget];
                    widgetOrder[swapTarget] = temp;
                }

                if (draggedElement) {
                    draggedElement.classList.remove('widget-dragging');
                    draggedElement.style.transform = '';
                }
                removeWidgetDragOverlay();
                widgetIsDragging = false;
                isDragging = false;
                draggedElement = null;
                draggedIndex = -1;
                dragSource = 'grid';

                renderWidgets();
                saveLayout();
                initWeatherWidget();
            }
        }

        function onWidgetPointerCancel(e) {
            clearTimeout(widgetLongPressTimer);
            if (widgetIsDragging) {
                if (draggedElement) {
                    draggedElement.classList.remove('widget-dragging');
                    draggedElement.style.transform = '';
                }
                removeWidgetDragOverlay();
                widgetIsDragging = false;
                isDragging = false;
                draggedElement = null;
                draggedIndex = -1;
                renderWidgets();
            }
        }

        element.addEventListener('mousedown', onWidgetPointerDown);
        element.addEventListener('mousemove', onWidgetPointerMove);
        element.addEventListener('mouseup', onWidgetPointerUp);
        element.addEventListener('mouseleave', onWidgetPointerCancel);

        element.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            onWidgetPointerDown({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} });
        }, { passive: false });
        element.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            onWidgetPointerMove({ clientX: touch.clientX, clientY: touch.clientY });
        }, { passive: false });
        element.addEventListener('touchend', (e) => {
            onWidgetPointerUp(e);
        });
        element.addEventListener('touchcancel', (e) => {
            onWidgetPointerCancel(e);
        });
    }

    // ============================================
    // 应用网格渲染
    // ============================================
    // 计算网格单元格尺寸
    function getGridMetrics() {
        const grid = document.getElementById('app-grid');
        const gridRect = grid.getBoundingClientRect();
        const cellWidth = gridRect.width / GRID_COLS;
        const cellHeight = gridRect.height / GRID_ROWS_TOTAL;
        return { cellWidth, cellHeight, gridRect };
    }

    // 获取app在网格中的位置（col, row）
    function getAppGridPosition(index) {
        const col = index % GRID_COLS;
        const row = Math.floor(index / GRID_COLS);
        return { col, row };
    }

    function renderAppGrid() {
        const grid = document.getElementById('app-grid');
        grid.innerHTML = '';

        // 确保grid有高度（通过flex:1已设置）
        const gridRect = grid.getBoundingClientRect();
        const cellWidth = gridRect.width / GRID_COLS;
        const cellHeight = gridRect.height > 0 ? gridRect.height / GRID_ROWS_TOTAL : 95;

        currentApps.forEach((app, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'app-icon-wrapper' + (isEditMode ? ' edit-mode' : '');
            wrapper.dataset.index = index;
            wrapper.dataset.appId = app.id;

            // 计算网格位置并吸附
            const { col, row } = getAppGridPosition(index);
            const iconW = 70;
            const iconH = 85;
            const offsetX = (cellWidth - iconW) / 2;
            const offsetY = (cellHeight - iconH) / 2;
            wrapper.style.left = (col * cellWidth + Math.max(0, offsetX)) + 'px';
            wrapper.style.top = (row * cellHeight + Math.max(0, offsetY)) + 'px';

            const iconDiv = document.createElement('div');
            iconDiv.className = 'app-icon';

            if (app.useImage) {
                const picture = document.createElement('picture');
                const source = document.createElement('source');
                source.srcset = 'Setting_Dark.png';
                source.media = '(prefers-color-scheme: dark)';
                const img = document.createElement('img');
                img.src = 'Setting_Light.png';
                img.alt = app.name;
                img.className = 'settings-icon-img';
                picture.appendChild(source);
                picture.appendChild(img);
                iconDiv.appendChild(picture);
            } else {
                iconDiv.textContent = app.icon;
            }

            const nameDiv = document.createElement('div');
            nameDiv.className = 'app-name';
            nameDiv.textContent = app.name;

            wrapper.appendChild(iconDiv);
            wrapper.appendChild(nameDiv);

            setupDragEvents(wrapper, index);
            grid.appendChild(wrapper);
        });
    }

    function renderDock() {
        const dock = document.getElementById('dock-bar');
        dock.innerHTML = '';

        // Dock栏独立管理，不再自动取前4个
        dockApps.forEach((app, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'app-icon-wrapper' + (isEditMode ? ' edit-mode' : '');
            wrapper.dataset.index = index;
            wrapper.dataset.appId = app.id;
            wrapper.dataset.area = 'dock';
            wrapper.style.cursor = 'pointer';

            const iconDiv = document.createElement('div');
            iconDiv.className = 'app-icon';

            if (app.useImage) {
                const picture = document.createElement('picture');
                const source = document.createElement('source');
                source.srcset = 'Setting_Dark.png';
                source.media = '(prefers-color-scheme: dark)';
                const img = document.createElement('img');
                img.src = 'Setting_Light.png';
                img.alt = app.name;
                img.className = 'settings-icon-img-dock';
                picture.appendChild(source);
                picture.appendChild(img);
                iconDiv.appendChild(picture);
            } else {
                iconDiv.textContent = app.icon;
            }

            wrapper.appendChild(iconDiv);

            // Dock栏图标也绑定事件（支持拖拽和点击）
            setupDockDragEvents(wrapper, index);

            dock.appendChild(wrapper);
        });

        // 编辑模式下，如果Dock未满，显示占位符提示
        if (isEditMode && dockApps.length < MAX_DOCK_APPS) {
            for (let i = dockApps.length; i < MAX_DOCK_APPS; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'app-icon';
                placeholder.style.opacity = '0.3';
                placeholder.style.border = '2px dashed rgba(255,255,255,0.4)';
                placeholder.style.borderRadius = '15px';
                placeholder.style.width = '55px';
                placeholder.style.height = '55px';
                placeholder.style.display = 'flex';
                placeholder.style.justifyContent = 'center';
                placeholder.style.alignItems = 'center';
                placeholder.style.fontSize = '20px';
                placeholder.textContent = '+';
                placeholder.style.color = 'rgba(255,255,255,0.5)';
                dock.appendChild(placeholder);
            }
        }
    }

    // ============================================
    // 长按 + 拖拽事件
    // ============================================
    // ============================================
    // Dock栏拖拽事件
    // ============================================
    function setupDockDragEvents(element, index) {
        // 鼠标事件
        element.addEventListener('mousedown', (e) => onPointerDown(e, element, index, 'dock'));
        element.addEventListener('mousemove', (e) => onPointerMove(e, element));
        element.addEventListener('mouseup', (e) => onPointerUp(e, element, index, 'dock'));
        element.addEventListener('mouseleave', (e) => onPointerCancel(e));

        // 触摸事件
        element.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            onPointerDown({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} }, element, index, 'dock');
        }, { passive: false });

        element.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            onPointerMove({ clientX: touch.clientX, clientY: touch.clientY }, element);
        }, { passive: false });

        element.addEventListener('touchend', (e) => {
            onPointerUp(e, element, index, 'dock');
        });

        element.addEventListener('touchcancel', (e) => {
            onPointerCancel(e);
        });
    }

    function setupDragEvents(element, index) {
        // 鼠标事件
        element.addEventListener('mousedown', (e) => onPointerDown(e, element, index, 'grid'));
        element.addEventListener('mousemove', (e) => onPointerMove(e, element));
        element.addEventListener('mouseup', (e) => onPointerUp(e, element, index, 'grid'));
        element.addEventListener('mouseleave', (e) => onPointerCancel(e));

        // 触摸事件
        element.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            onPointerDown({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} }, element, index, 'grid');
        }, { passive: false });

        element.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            onPointerMove({ clientX: touch.clientX, clientY: touch.clientY }, element);
        }, { passive: false });

        element.addEventListener('touchend', (e) => {
            onPointerUp(e, element, index, 'grid');
        });

        element.addEventListener('touchcancel', (e) => {
            onPointerCancel(e);
        });
    }

    function onPointerDown(e, element, index, source = 'grid') {
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        draggedIndex = index;
        dragSource = source;

        // 启动长按计时器
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
            if (!isEditMode) {
                enterEditMode();
            }
            // 开始拖拽
            startDrag(element, index, source);
        }, LONG_PRESS_DURATION);

        // 如果已经在编辑模式，准备立即拖拽
        if (isEditMode) {
            clearTimeout(longPressTimer);
            longPressTimer = setTimeout(() => {
                startDrag(element, index, source);
            }, 150); // 编辑模式下更短的延迟
        }
    }

    /**
     * 判断当前指针是否在Dock栏区域内
     */
    function isPointerInDock(clientX, clientY) {
        const dock = document.getElementById('dock-bar');
        const dockRect = dock.getBoundingClientRect();
        return clientY >= dockRect.top && clientY <= dockRect.bottom &&
               clientX >= dockRect.left && clientX <= dockRect.right;
    }

    /**
     * 判断当前指针是否在主屏幕网格区域内
     */
    function isPointerInGrid(clientX, clientY) {
        const grid = document.getElementById('app-grid');
        const gridRect = grid.getBoundingClientRect();
        return clientY >= gridRect.top && clientY <= gridRect.bottom + 50 &&
               clientX >= gridRect.left && clientX <= gridRect.right;
    }

    function onPointerMove(e, element) {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;

        // 移动超过阈值取消长按
        if (!isDragging && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
            clearTimeout(longPressTimer);
        }

        if (isDragging && draggedElement) {
            dragOffsetX = dx;
            dragOffsetY = dy;

            // 更新浮层位置（而不是原元素）
            if (dragOverlayEl) {
                dragOverlayEl.style.left = (e.clientX - 30) + 'px';
                dragOverlayEl.style.top = (e.clientY - 30) + 'px';
            }

            // 原位置元素保持半透明占位
            draggedElement.style.opacity = '0.3';
            draggedElement.style.transform = '';

            const inDock = isPointerInDock(e.clientX, e.clientY);
            const inGrid = isPointerInGrid(e.clientX, e.clientY);

            // 高亮Dock栏（当从grid拖入dock时）
            const dock = document.getElementById('dock-bar');
            if (inDock && dragSource === 'grid') {
                dock.style.outline = '2px solid rgba(0,122,255,0.6)';
                dock.style.outlineOffset = '-2px';
            } else {
                dock.style.outline = '';
                dock.style.outlineOffset = '';
            }

            // 如果在grid区域内拖拽（且来源是grid），执行grid内排序
            if (inGrid && dragSource === 'grid') {
                const grid = document.getElementById('app-grid');
                const gridRect = grid.getBoundingClientRect();
                const cellWidth = gridRect.width / 4;
                const cellHeight = 105;

                const currentCenterX = e.clientX - gridRect.left;
                const currentCenterY = e.clientY - gridRect.top;

                const targetCol = Math.max(0, Math.min(3, Math.floor(currentCenterX / cellWidth)));
                const targetRow = Math.max(0, Math.floor(currentCenterY / cellHeight));
                const targetIndex = Math.min(currentApps.length - 1, Math.max(0, targetRow * 4 + targetCol));

                // 高亮目标位置
                document.querySelectorAll('.app-icon-wrapper.drop-target').forEach(el => {
                    el.classList.remove('drop-target');
                });

                if (targetIndex !== draggedIndex && targetIndex >= 0 && targetIndex < currentApps.length) {
                    const targetEl = grid.children[targetIndex];
                    if (targetEl && targetEl !== draggedElement) {
                        targetEl.classList.add('drop-target');
                    }

                    // 交换位置
                    const movedApp = currentApps.splice(draggedIndex, 1)[0];
                    currentApps.splice(targetIndex, 0, movedApp);

                    // 更新拖拽参考
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    dragOffsetX = 0;
                    dragOffsetY = 0;
                    draggedIndex = targetIndex;

                    // 重新渲染（但保持拖拽状态）
                    renderAppGridDuringDrag(targetIndex);
                }
            }

            // 如果在dock区域内拖拽（且来源是dock），执行dock内排序
            if (inDock && dragSource === 'dock' && dockApps.length > 1) {
                const dockEl = document.getElementById('dock-bar');
                const dockRect = dockEl.getBoundingClientRect();
                const dockCellWidth = dockRect.width / Math.max(dockApps.length, 1);
                const currentX = e.clientX - dockRect.left;
                const targetDockIndex = Math.max(0, Math.min(dockApps.length - 1, Math.floor(currentX / dockCellWidth)));

                if (targetDockIndex !== draggedIndex) {
                    const movedApp = dockApps.splice(draggedIndex, 1)[0];
                    dockApps.splice(targetDockIndex, 0, movedApp);

                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    dragOffsetX = 0;
                    dragOffsetY = 0;
                    draggedIndex = targetDockIndex;

                    renderDock();
                }
            }
        }
    }

    function onPointerUp(e, element, index, source = 'grid') {
        clearTimeout(longPressTimer);

        if (isDragging) {
            // 判断拖拽结束时的位置
            const clientX = e.clientX || (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : dragStartX);
            const clientY = e.clientY || (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : dragStartY);
            const inDock = isPointerInDock(clientX, clientY);
            const inGrid = isPointerInGrid(clientX, clientY);

            if (dragSource === 'grid' && inDock && dockApps.length < MAX_DOCK_APPS) {
                // 从主屏幕拖到Dock栏
                const app = currentApps[draggedIndex];
                if (app) {
                    currentApps.splice(draggedIndex, 1);
                    dockApps.push(app);
                }
            } else if (dragSource === 'dock' && inGrid) {
                // 从Dock栏拖回主屏幕
                const app = dockApps[draggedIndex];
                if (app) {
                    dockApps.splice(draggedIndex, 1);
                    currentApps.push(app);
                }
            }

            finishDrag();
        } else if (!isEditMode) {
            // 普通点击
            const appList = source === 'dock' ? dockApps : currentApps;
            const app = appList[index];
            if (app && app.id === 'settings') {
                showSettings();
            } else if (app && app.id === 'chat') {
                openChatApp();
            }
        }
    }

    function onPointerCancel(e) {
        clearTimeout(longPressTimer);
        if (isDragging) {
            finishDrag();
        }
    }

    function startDrag(element, index, source = 'grid') {
        isDragging = true;
        draggedElement = element;
        draggedIndex = index;
        dragSource = source;
        dragOffsetX = 0;
        dragOffsetY = 0;

        element.classList.add('dragging');
        element.style.transition = 'none';
        element.style.opacity = '0.3'; // 原位置变为半透明占位

        // 创建拖拽浮层
        createDragOverlay(element, source);

        // 震动反馈（移动端）
        if (navigator.vibrate) {
            navigator.vibrate(50);
        }
    }

    /**
     * 创建拖拽浮层 - 克隆被拖拽元素，放到body上，fixed定位确保在最顶层
     * z-index: 99999 确保在所有元素之上（包括dock栏）
     */
    function createDragOverlay(element, source) {
        removeDragOverlay();

        dragOverlayEl = element.cloneNode(true);
        dragOverlayEl.className = 'drag-overlay';
        dragOverlayEl.style.position = 'fixed';
        dragOverlayEl.style.zIndex = '99999';
        dragOverlayEl.style.pointerEvents = 'none';
        dragOverlayEl.style.opacity = '0.85';
        dragOverlayEl.style.transform = 'scale(1.15)';

        const rect = element.getBoundingClientRect();
        dragOverlayEl.style.left = rect.left + 'px';
        dragOverlayEl.style.top = rect.top + 'px';
        dragOverlayEl.style.width = rect.width + 'px';

        document.body.appendChild(dragOverlayEl);
    }

    function removeDragOverlay() {
        if (dragOverlayEl && dragOverlayEl.parentNode) {
            dragOverlayEl.parentNode.removeChild(dragOverlayEl);
        }
        dragOverlayEl = null;
    }

    function finishDrag() {
        isDragging = false;

        // 移除浮层
        removeDragOverlay();

        if (draggedElement) {
            draggedElement.classList.remove('dragging');
            draggedElement.style.transform = '';
            draggedElement.style.zIndex = '';
            draggedElement.style.transition = '';
            draggedElement.style.opacity = '';
            draggedElement = null;
        }

        document.querySelectorAll('.app-icon-wrapper.drop-target').forEach(el => {
            el.classList.remove('drop-target');
        });

        // 清除Dock高亮
        const dock = document.getElementById('dock-bar');
        dock.style.outline = '';
        dock.style.outlineOffset = '';

        draggedIndex = -1;
        dragOffsetX = 0;
        dragOffsetY = 0;
        dragSource = 'grid';

        renderAppGrid();
        renderDock();
        saveLayout();
    }

    /**
     * 拖拽过程中重新渲染（保持被拖拽元素的状态，使用绝对定位吸附网格）
     */
    function renderAppGridDuringDrag(activeIndex) {
        const grid = document.getElementById('app-grid');
        grid.innerHTML = '';

        const gridRect = grid.getBoundingClientRect();
        const cellWidth = gridRect.width / GRID_COLS;
        const cellHeight = gridRect.height > 0 ? gridRect.height / GRID_ROWS_TOTAL : 95;

        currentApps.forEach((app, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'app-icon-wrapper edit-mode';
            wrapper.dataset.index = index;
            wrapper.dataset.appId = app.id;

            // 网格吸附定位
            const { col, row } = getAppGridPosition(index);
            const iconW = 70;
            const iconH = 85;
            const offsetX = (cellWidth - iconW) / 2;
            const offsetY = (cellHeight - iconH) / 2;
            wrapper.style.left = (col * cellWidth + Math.max(0, offsetX)) + 'px';
            wrapper.style.top = (row * cellHeight + Math.max(0, offsetY)) + 'px';

            if (index === activeIndex) {
                wrapper.classList.add('dragging');
                wrapper.style.transition = 'none';
                draggedElement = wrapper;
            }

            const iconDiv = document.createElement('div');
            iconDiv.className = 'app-icon';

            if (app.useImage) {
                const picture = document.createElement('picture');
                const source = document.createElement('source');
                source.srcset = 'Setting_Dark.png';
                source.media = '(prefers-color-scheme: dark)';
                const img = document.createElement('img');
                img.src = 'Setting_Light.png';
                img.alt = app.name;
                img.className = 'settings-icon-img';
                picture.appendChild(source);
                picture.appendChild(img);
                iconDiv.appendChild(picture);
            } else {
                iconDiv.textContent = app.icon;
            }

            const nameDiv = document.createElement('div');
            nameDiv.className = 'app-name';
            nameDiv.textContent = app.name;

            wrapper.appendChild(iconDiv);
            wrapper.appendChild(nameDiv);

            setupDragEvents(wrapper, index);

            grid.appendChild(wrapper);
        });
    }

    // ============================================
    // 编辑模式
    // ============================================
    function enterEditMode() {
        isEditMode = true;
        document.getElementById('edit-done-btn').classList.add('active');
        renderWidgets();
        renderAppGrid();
        renderDock();
    }

    function exitEditMode() {
        isEditMode = false;
        document.getElementById('edit-done-btn').classList.remove('active');
        renderWidgets();
        renderAppGrid();
        renderDock();
        saveLayout();
    }

    document.getElementById('edit-done-btn').addEventListener('click', () => {
        exitEditMode();
    });

    // 点击空白区域退出编辑模式
    document.getElementById('home-screen').addEventListener('click', (e) => {
        if (isEditMode && e.target.id === 'home-screen') {
            exitEditMode();
        }
    });

    // ============================================
    // 布局持久化
    // ============================================
    async function saveLayout() {
        const items = [];
        // 保存主屏幕网格
        currentApps.forEach((app, index) => {
            items.push({ appId: app.id, position: index, area: 'grid' });
        });
        // 保存Dock栏
        dockApps.forEach((app, index) => {
            items.push({ appId: app.id, position: index, area: 'dock' });
        });
        // 保存小组件顺序
        widgetOrder.forEach((widgetId, index) => {
            items.push({ appId: widgetId, position: index, area: 'widget' });
        });
        await layoutManager.saveLayout(items);
    }

    // ============================================
    // 授权相关
    // ============================================
    function refreshActivationUI() {
        if (licenseManager.isActivated()) {
            const statusEls = document.querySelectorAll('.status-val');
            statusEls.forEach(el => el.textContent = "已查看 >");
            const expiryEl = document.getElementById('expiry-date-web');
            if (expiryEl) {
                expiryEl.textContent = `有效期至: ${licenseManager.getExpirationDateString()}`;
                expiryEl.style.display = 'block';
            }
        }
    }

    window.unlock = function() {
        document.getElementById('lock-screen').classList.add('unlocked');
    }

    window.showSettings = function() {
        document.getElementById('settings-overlay').style.display = 'flex';
    }

    window.hideSettings = function() {
        document.getElementById('settings-overlay').style.display = 'none';
    }

    window.showDisplaySettings = function() {
        document.getElementById('display-settings-overlay').style.display = 'flex';
        updateWallpaperPreviews();
    }

    window.hideDisplaySettings = function() {
        document.getElementById('display-settings-overlay').style.display = 'none';
    }

    let pendingWallpaperType = 'lock';
    window.selectWallpaper = function(type) {
        pendingWallpaperType = type;
        document.getElementById('wallpaper-input').click();
    }

    window.handleWallpaperUpload = function(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const imageData = e.target.result;
            localStorage.setItem(`wallpaper_${pendingWallpaperType}`, imageData);
            updateWallpaperPreviews();
            applyWallpapers();
        };
        reader.readAsDataURL(file);
    }

    function updateWallpaperPreviews() {
        ['lock', 'home'].forEach(type => {
            const data = localStorage.getItem(`wallpaper_${type}`);
            const preview = document.getElementById(`${type}-wp-preview`);
            const status = document.getElementById(`${type}-wp-status`);
            if (data) {
                preview.innerHTML = `<img src="${data}" style="width: 100%; height: 100%; object-fit: cover;">`;
                status.textContent = "已设置，点击更换";
            }
        });
    }

    function applyWallpapers() {
        const lockWp = localStorage.getItem('wallpaper_lock');
        const homeWp = localStorage.getItem('wallpaper_home');
        
        if (lockWp) {
            document.getElementById('lock-screen').style.background = `url(${lockWp}) no-repeat center center`;
            document.getElementById('lock-screen').style.backgroundSize = 'cover';
        }
        if (homeWp) {
            document.getElementById('phone-container').style.background = `url(${homeWp}) no-repeat center center`;
            document.getElementById('phone-container').style.backgroundSize = 'cover';
        }
    }
    applyWallpapers();

    window.showActivation = function() {
        document.getElementById('activation-overlay').style.zIndex = 300;
        document.getElementById('activation-overlay').style.display = 'flex';
        document.getElementById('web-machine-id').textContent = licenseManager.getMachineId();
    }

    window.copyMachineId = function() {
        const text = document.getElementById('web-machine-id').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('机器码已复制');
        });
    }

    window.pasteLicenseKey = function() {
        navigator.clipboard.readText().then(text => {
            document.getElementById('license-key-input').value = text;
        });
    }

    window.hideActivation = function() {
        document.getElementById('activation-overlay').style.display = 'none';
    }

    window.addEventListener('popstate', function(event) {
        if (document.getElementById('activation-overlay').style.display === 'flex') {
            hideActivation();
            history.pushState(null, null, null);
        } else if (document.getElementById('settings-overlay').style.display === 'flex') {
            hideSettings();
            history.pushState(null, null, null);
        }
    });
    history.pushState(null, null, null);

    window.submitActivation = async function() {
        const license = document.getElementById('license-key-input').value?.trim();
        if (!license) {
            alert('请输入激活码。');
            return;
        }

        const result = await licenseManager.verifyLicense(license);
        if (result.success) {
            alert('软件激活成功！');
            refreshActivationUI();
            hideActivation();
        } else {
            alert(`激活失败: ${result.error}`);
        }
    }

    // ============================================
    // 时钟更新
    // ============================================
    function updateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timeStr = `${hours}:${minutes}`;

        document.querySelectorAll('.time, .lock-time').forEach(el => el.textContent = timeStr);

        const widgetTime = document.getElementById('widget-time');
        if (widgetTime) widgetTime.textContent = timeStr;

        const widgetDate = document.getElementById('widget-date');
        if (widgetDate) {
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const day = days[now.getDay()];
            widgetDate.textContent = `${month}月${date}日 ${day}`;
        }
    }
    setInterval(updateTime, 1000);
    updateTime();

    // ============================================
    // 天气初始化
    // ============================================
    async function initWeatherWidget() {
        try {
            const city = await getLocation();
            document.querySelectorAll('.widget-city').forEach(el => el.textContent = city);
            const weatherWidget = document.querySelector('.weather-widget');
            if (weatherWidget) {
                const cityEl = weatherWidget.querySelector('div > div:first-child');
                if (cityEl) cityEl.textContent = city;
            }

            if (city) {
                const weather = await getWeather(city);
                if (weatherWidget) {
                    const tempEl = weatherWidget.querySelector('.widget-temp');
                    const statusEl = weatherWidget.querySelector('.widget-status');
                    const rangeEl = weatherWidget.querySelector('.widget-range');

                    if (tempEl) tempEl.textContent = weather.temperature.replace(' ', '');
                    if (statusEl) statusEl.textContent = weather.description;
                    if (weather.forecast && weather.forecast.length > 0) {
                        rangeEl.textContent = `Wind: ${weather.wind}`;
                    }
                }
            }
        } catch (error) {
            console.error('获取环境信息失败:', error);
        }
    }
    initWeatherWidget();

    // ============================================
    // 聊天App
    // ============================================
    function openChatApp() {
        const container = document.getElementById('chat-app-container');
        container.style.display = 'block';
        chatAppInstance = new ChatApp(container, () => {
            container.style.display = 'none';
            chatAppInstance = null;
        });
    }
    window.openChatApp = openChatApp;
</script>

</body>
</html>
