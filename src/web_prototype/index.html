<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汪汪机 - iOS 桌面原型</title>
    <style>
        :root {
            --ios-radius: 20px;
            --dock-bg: rgba(255, 255, 255, 0.3);
            --text-color: white;
            --bg-color: #F2F2F7;
            --card-bg: white;
            --system-text: black;
            --header-bg: white;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1C1C1E;
                --card-bg: #2C2C2E;
                --system-text: white;
                --header-bg: #2C2C2E;
            }
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        #phone-container {
            position: relative;
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            border-radius: 40px;
            box-shadow: 0 0 0 10px #333, 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 状态栏 */
        .status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
        }

        .status-right {
            display: flex;
            gap: 5px;
        }

        /* 锁屏界面 */
        #lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 100px;
            z-index: 50;
            transition: transform 0.5s ease-in-out;
            background: inherit;
        }

        #lock-screen.unlocked {
            transform: translateY(-100%);
        }

        .lock-time {
            font-size: 80px;
            font-weight: 200;
            color: var(--text-color);
        }

        .lock-date {
            font-size: 20px;
            margin-top: -10px;
            color: var(--text-color);
        }

        .unlock-hint {
            position: absolute;
            bottom: 50px;
            color: var(--text-color);
            font-size: 16px;
            animation: breathe 2s infinite;
            cursor: pointer;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 桌面界面 */
        #home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            box-sizing: border-box;
        }

        /* 小组件区域 */
        .widgets-area {
            display: flex;
            gap: 15px;
            padding: 0 20px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .widget {
            flex: 1;
            height: 150px;
            border-radius: 20px;
            padding: 15px;
            box-sizing: border-box;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .clock-widget {
            background: linear-gradient(135deg, #E0C3FC 0%, #8EC5FC 100%);
        }

        .weather-widget {
            background: linear-gradient(135deg, #4FACFE 0%, #00F2FE 100%);
        }

        .widget-date {
            font-size: 12px;
            font-weight: 500;
        }

        .widget-time {
            font-size: 40px;
            font-weight: bold;
        }

        .widget-city {
            font-size: 10px;
            opacity: 0.8;
        }

        .widget-temp {
            font-size: 40px;
            font-weight: 300;
        }

        .widget-icon {
            font-size: 24px;
        }

        .widget-status {
            font-size: 12px;
        }

        .widget-range {
            font-size: 10px;
            opacity: 0.8;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px;
            padding: 20px;
        }

        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .app-name {
            color: white;
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Dock 栏 */
        .dock {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            height: 90px;
            background: var(--dock-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            width: 120px;
            height: 5px;
            background: white;
            border-radius: 5px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
        }

        /* 设置界面覆盖层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding-top: env(safe-area-inset-top); /* 适配状态栏 */
        }

        .overlay-header {
            height: 60px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            color: var(--system-text);
        }

        .back-btn {
            position: absolute;
            left: 15px;
            color: #007AFF;
            cursor: pointer;
            font-size: 16px;
        }

        .overlay-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 13px;
            color: #666;
            margin-left: 10px;
            margin-bottom: 5px;
        }

        .settings-list {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            color: var(--system-text);
        }

        .settings-item {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .status-val {
            color: #8E8E93;
        }

        /* 激活界面 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .input-box {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px;
            word-break: break-all;
            min-height: 20px;
            color: var(--system-text);
        }

        textarea.input-box {
            width: 100%;
            border: none;
            height: 100px;
            box-sizing: border-box;
            font-family: inherit;
            resize: none;
            background: var(--card-bg);
            color: var(--system-text);
        }

        .btn-primary {
            background: #007AFF;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="phone-container">
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="time">09:41</div>
        <div class="status-right">
            <span>📶</span>
            <span>5G</span>
            <span>🔋</span>
        </div>
    </div>

    <!-- 锁屏界面 -->
    <div id="lock-screen" onclick="unlock()">
        <div class="lock-time">09:41</div>
        <div class="lock-date">2月3日 星期二</div>
        <div class="unlock-hint">点击屏幕解锁</div>
    </div>

    <!-- 桌面界面 -->
    <div id="home-screen">
        <!-- 小组件区域 -->
        <div class="widgets-area">
            <div class="widget clock-widget">
                <div class="widget-date" id="widget-date">10月1日 星期一</div>
                <div class="widget-time" id="widget-time">09:41</div>
                <div class="widget-city">北京</div>
            </div>
            <div class="widget weather-widget">
                <div>
                    <div style="font-weight: bold;">北京</div>
                    <div class="widget-temp">24°</div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <div class="widget-icon">☀️</div>
                        <div class="widget-status">晴朗</div>
                    </div>
                    <div class="widget-range">最高 28° 最低 18°</div>
                </div>
            </div>
        </div>

        <div class="app-grid">
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);">📞</div>
                <div class="app-name">电话</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);">💬</div>
                <div class="app-name">信息</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);">🧭</div>
                <div class="app-name">Safari</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);">🎵</div>
                <div class="app-name">音乐</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: #fff;">📷</div>
                <div class="app-name">相机</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: #fff;">📅</div>
                <div class="app-name">日历</div>
            </div>
            <div class="app-icon-wrapper" onclick="showSettings()">
                <div class="app-icon" style="background: #fff;">⚙️</div>
                <div class="app-name">设置</div>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon" style="background: #fff;">🐶</div>
                <div class="app-name">汪汪</div>
            </div>
        </div>

        <!-- Dock 栏 -->
        <div class="dock">
            <div class="app-icon" style="width: 55px; height: 55px;">📞</div>
            <div class="app-icon" style="width: 55px; height: 55px;">💬</div>
            <div class="app-icon" style="width: 55px; height: 55px;">🧭</div>
            <div class="app-icon" style="width: 55px; height: 55px;">🎵</div>
        </div>

        <div class="home-indicator"></div>
    </div>
    <!-- 设置 Overlay -->
    <div id="settings-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideSettings()">返回</div>
            <div style="font-weight: 600;">设置</div>
        </div>
        <div class="overlay-content">
            <div class="settings-section">
                <div class="section-title">激活与授权</div>
                <div class="settings-list">
                    <div class="settings-item" onclick="showActivation()">
                        <span>软件激活</span>
                        <span class="status-val">未激活 ></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 激活 Overlay -->
    <div id="activation-overlay" class="overlay">
        <div class="overlay-header">
            <div class="back-btn" onclick="hideActivation()">取消</div>
            <div style="font-weight: 600;">激活授权</div>
        </div>
        <div class="overlay-content">
            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <div class="input-label" style="margin-bottom: 0;">机器码</div>
                    <div style="color: #007AFF; font-size: 14px; cursor: pointer;" onclick="copyMachineId()">复制</div>
                </div>
                <div id="web-machine-id" class="input-box">WEB-ID-FETCHING...</div>
            </div>
            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <div class="input-label" style="margin-bottom: 0;">激活码</div>
                    <div style="color: #007AFF; font-size: 14px; cursor: pointer;" onclick="pasteLicenseKey()">粘贴</div>
                </div>
                <textarea id="license-key-input" class="input-box" placeholder="请输入激活码..."></textarea>
            </div>
            <button class="btn-primary" onclick="submitActivation()">激活</button>
        </div>
    </div>
</div>

<script type="module">
    import { getLocation } from './js/location.js';
    import { getWeather } from './js/weather.js';

    window.unlock = function() {
        document.getElementById('lock-screen').classList.add('unlocked');
    }

    window.showSettings = function() {
        document.getElementById('settings-overlay').style.display = 'flex';
    }

    window.hideSettings = function() {
        document.getElementById('settings-overlay').style.display = 'none';
    }

    window.showActivation = function() {
        // 先隐藏设置界面，或者确保激活界面层级更高
        // document.getElementById('settings-overlay').style.display = 'none';
        document.getElementById('activation-overlay').style.zIndex = 300;
        document.getElementById('activation-overlay').style.display = 'flex';
        // 模拟 Web 端获取 Machine ID (使用简单的浏览器指纹)
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "top";
        ctx.font = "14px 'Arial'";
        ctx.fillText("WWJ-WEB-PROTOTYPE", 2, 2);
        const webId = btoa(canvas.toDataURL()).substring(100, 116);
        document.getElementById('web-machine-id').textContent = "WEB-" + webId;
    }

    window.copyMachineId = function() {
        const text = document.getElementById('web-machine-id').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('机器码已复制');
        });
    }

    window.pasteLicenseKey = function() {
        navigator.clipboard.readText().then(text => {
            document.getElementById('license-key-input').value = text;
        });
    }

    window.hideActivation = function() {
        document.getElementById('activation-overlay').style.display = 'none';
    }

    // 监听原生返回 (浏览器后退)
    window.addEventListener('popstate', function(event) {
        if (document.getElementById('activation-overlay').style.display === 'flex') {
            hideActivation();
            // 注意：不调用 hideSettings，这样激活界面关闭后，设置界面仍然可见
            history.pushState(null, null, null);
        } else if (document.getElementById('settings-overlay').style.display === 'flex') {
            hideSettings();
            history.pushState(null, null, null);
        }
    });
    history.pushState(null, null, null);

    window.submitActivation = function() {
        alert('激活码校验中...');
        hideActivation();
    }

    // 更新时间
    function updateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const timeStr = `${hours}:${minutes}`;
        
        // 更新顶部栏和锁屏时间
        document.querySelectorAll('.time, .lock-time').forEach(el => el.textContent = timeStr);
        
        // 更新 Widget 时间
        const widgetTime = document.getElementById('widget-time');
        if (widgetTime) widgetTime.textContent = timeStr;

        // 更新 Widget 日期
        const widgetDate = document.getElementById('widget-date');
        if (widgetDate) {
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const day = days[now.getDay()];
            widgetDate.textContent = `${month}月${date}日 ${day}`;
        }
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 初始化天气组件
    async function initWeatherWidget() {
        try {
            console.log("Initializing Weather Widget...");
            // 1. 获取城市
            const city = await getLocation();
            console.log('当前定位城市:', city);

            // 更新 UI 城市显示
            document.querySelectorAll('.widget-city').forEach(el => el.textContent = city);
            // 天气组件里通常也有个城市名显示
            // 注意：原有HTML结构里 Weather Widget 的城市名是硬编码的 "北京"
            // 我们需要找到它并更新.
            // 结构: <div class="widget weather-widget"> -> <div> -> <div style="font-weight: bold;">北京</div>
            const weatherWidget = document.querySelector('.weather-widget');
            if (weatherWidget) {
                const cityEl = weatherWidget.querySelector('div > div:first-child');
                if (cityEl) cityEl.textContent = city;
            }

            // 2. 获取天气
            if (city) {
                const weather = await getWeather(city);
                console.log(`天气：${weather.description}, 温度：${weather.temperature}`);
                
                // 更新 UI
                if (weatherWidget) {
                    const tempEl = weatherWidget.querySelector('.widget-temp');
                    const statusEl = weatherWidget.querySelector('.widget-status');
                    const rangeEl = weatherWidget.querySelector('.widget-range');
                    
                    if (tempEl) tempEl.textContent = weather.temperature.replace(' ', ''); // "+5 °C" -> "+5°C"
                    if (statusEl) statusEl.textContent = weather.description;
                    
                    // Forecast data is array, we might pick first day for range or just use description
                    if (weather.forecast && weather.forecast.length > 0) {
                        // API might not give high/low directly in main object, sometimes it's in description or not available simply
                        // For this prototype, we just show forecast[0] temp as "Future: ..." or keep it simple
                        // Let's assume we want to show wind as range/extra info since API returns wind
                        rangeEl.textContent = `Wind: ${weather.wind}`;
                    }
                }
            }
        } catch (error) {
            console.error('获取环境信息失败:', error);
        }
    }

    // 启动初始化
    initWeatherWidget();
</script>

</body>
</html>
