<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汪汪机 - 授权签名管理后台</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-color: #000000;
            --secondary-text: #8E8E93;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1C1C1E;
                --card-bg: #2C2C2E;
                --text-color: #FFFFFF;
                --secondary-text: #AEAEB2;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--secondary-text);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            height: 100px;
            resize: none;
            word-break: break-all;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background-color: var(--primary-color);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            background-color: var(--secondary-text);
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 30px;
            display: none;
        }

        .result-box {
            background-color: rgba(52, 199, 89, 0.1);
            border: 1px solid #34C759;
            color: #34C759;
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            position: relative;
        }

        .copy-btn {
            margin-top: 10px;
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .status-msg {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }

        .error {
            color: #FF3B30;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>汪汪机签名系统</h1>
            
            <div class="form-group">
                <label for="machineId">用户机器码 (Machine ID)</label>
                <input type="text" id="machineId" placeholder="例如: WIN-XXXXXX 或 AND-XXXXXX">
            </div>

            <div class="form-group">
                <label for="days">有效时长 (天)</label>
                <select id="days">
                    <option value="30">30 天 (月度)</option>
                    <option value="90">90 天 (季度)</option>
                    <option value="365" selected>365 天 (年度)</option>
                    <option value="3650">3650 天 (永久/长期)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="type">授权级别</label>
                <select id="type">
                    <option value="standard">标准版 (Standard)</option>
                    <option value="pro" selected>专业版 (Pro)</option>
                    <option value="enterprise">企业版 (Enterprise)</option>
                </select>
            </div>

            <button id="signBtn" class="btn">生成激活码</button>

            <div id="status" class="status-msg"></div>

            <div id="resultArea" class="result-area">
                <label>生成的激活码:</label>
                <div id="licenseResult" class="result-box"></div>
                <button id="copyBtn" class="copy-btn">复制激活码</button>
            </div>
        </div>
    </div>

    <script>
        const signBtn = document.getElementById('signBtn');
        const copyBtn = document.getElementById('copyBtn');
        const machineIdInput = document.getElementById('machineId');
        const daysSelect = document.getElementById('days');
        const typeSelect = document.getElementById('type');
        const resultArea = document.getElementById('resultArea');
        const licenseResult = document.getElementById('licenseResult');
        const statusMsg = document.getElementById('status');

        signBtn.onclick = async () => {
            const mid = machineIdInput.value.trim();
            if (!mid) {
                showStatus('请输入机器码', true);
                return;
            }

            signBtn.disabled = true;
            showStatus('正在生成...', false);
            resultArea.style.display = 'none';

            try {
                const response = await fetch('/api/sign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mid: mid,
                        days: parseInt(daysSelect.value),
                        type: typeSelect.value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    licenseResult.textContent = data.license;
                    resultArea.style.display = 'block';
                    showStatus('生成成功！', false);
                } else {
                    showStatus('失败: ' + data.error, true);
                }
            } catch (err) {
                showStatus('网络请求失败', true);
            } finally {
                signBtn.disabled = false;
            }
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(licenseResult.textContent).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '已复制！';
                setTimeout(() => copyBtn.textContent = originalText, 2000);
            });
        };

        function showStatus(msg, isError) {
            statusMsg.textContent = msg;
            statusMsg.className = 'status-msg' + (isError ? ' error' : '');
        }
    </script>
</body>
</html>
